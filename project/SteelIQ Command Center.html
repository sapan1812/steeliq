          <ParamRow name="Iron Input" value={useWave(148,140,158,2)} unit="t" lo={130} hi={170} color="var(--green)" dp={0}/>
          <ParamRow name="DRI Output" value={useWave(138,132,148,2)} unit="t" lo={120} hi={160} color="var(--green)" dp={0}/>
          <ParamRow name="Unreacted Ore" value={useWave(4.8,3,9,.3)} unit="t" lo={0} hi={15} color="var(--amber)" dp={1}/>
          <ParamRow name="Fines Loss" value={useWave(2.1,1,4,.15)} unit="t" lo={0} hi={10} color="var(--red)" dp={1}/>
        </div>
      </div>
    </div>
  );
  if(sub==='Anomaly Detection') return (
    <div className="content">
      <div className="card">
        <div className="card-header"><div className="card-title"><span className="badge badge-ai">AI · ML</span>DRI Anomaly Detection</div><div className="live-chip"><div className="ldot"/>MONITORING</div></div>
        <div className="card-body">
          {[{p:'Gas Flow',st:'normal',v:'28,400 Nm³/h',sc:.08},{p:'Zone 3 Pressure',st:'anomaly',v:'0.61 bar ↑',sc:.74},{p:'Metallization',st:'normal',v:'92.4%',sc:.12},{p:'Zone 3 Temp',st:'warning',v:'956°C (−8°C)',sc:.41},{p:'Carbon Content',st:'normal',v:'1.8%',sc:.15},{p:'Gas/Iron Ratio',st:'normal',v:'1.42',sc:.09}].map(a=>{
            const col=a.st==='anomaly'?'var(--red)':a.st==='warning'?'var(--amber)':'var(--green)';
            return (<div key={a.p} style={{display:'flex',alignItems:'center',gap:12,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
              <div style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0}}/>
              <div style={{flex:1,fontSize:11,color:'var(--text-mid)'}}>{a.p}</div>
              <div style={{fontFamily:'var(--mono)',fontSize:11,color:col,width:130,textAlign:'right'}}>{a.v}</div>
              <div style={{width:70}}><div style={{height:4,background:'var(--surface-2)',borderRadius:2}}><div style={{height:'100%',width:`${a.sc*100}%`,background:col,borderRadius:2}}/></div><div style={{fontSize:9,color:'var(--text-dim)',textAlign:'right',marginTop:2}}>{(a.sc*100).toFixed(0)}%</div></div>
            </div>);
          })}
        </div>
      </div>
    </div>
  );
  return null;
}

const ADMIN_SUBS = ['Module Registry','Platform Architecture','Data Sources','AI Model Config','User Management','Self-Support'];

function AdminView({sub, currentUser, moduleRegistry, setModuleRegistry}) {
  if(sub==='Module Registry')      return <ModuleRegistryView registry={moduleRegistry} setRegistry={setModuleRegistry}/>;
  if(sub==='Platform Architecture')return <PlatformArchitecture registry={moduleRegistry}/>;
  if(sub==='Data Sources')         return <DataSources/>;
  if(sub==='AI Model Config')      return <AIModelConfig/>;
  if(sub==='User Management')      return <UserManagement currentUser={currentUser}/>;
  if(sub==='Self-Support')         return <SelfSupport/>;
  return null;
}

/* ── Module Registry: list of installed microapps + install wizard ── */
function ModuleRegistryView({registry, setRegistry}) {
  const [wizardOpen, setWizardOpen] = useState(false);
  const toggleStatus = (id) => setRegistry(r => r.map(m => m.id===id ? {...m, status: m.status==='active' ? 'disabled' : 'active'} : m));
  const installNew = (m) => { setRegistry(r => [...r, m]); setWizardOpen(false); };

  const counts = {
    total: registry.length,
    active: registry.filter(m=>m.status==='active').length,
    beta: registry.filter(m=>m.status==='beta').length,
    dev: registry.filter(m=>m.status==='dev').length,
    iba: new Set(registry.flatMap(m=>m.iba)).size,
    l2: new Set(registry.flatMap(m=>m.l2)).size,
  };

  return (
    <div className="content">
      {/* Summary strip */}
      <div className="grid4">
        {[
          {l:'Microapps Installed',v:counts.total,c:'var(--text)'},
          {l:'Active in Production',v:counts.active,c:'var(--green)'},
          {l:'Beta / Dev Slots',v:counts.beta+counts.dev,c:'var(--amber)'},
          {l:'Data Bindings',v:`${counts.iba} IBA · ${counts.l2} L2`,c:'var(--blue)'},
        ].map(m=>(
          <div key={m.l} className="metric-box"><div className="metric-label">{m.l}</div><div className="metric-val" style={{color:m.c,fontSize:22}}>{m.v}</div></div>
        ))}
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title"><span className="badge badge-ad">REGISTRY</span>Installed Microapps</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:10,color:'var(--text-dim)'}}>Each module deploys, versions and scales independently</span>
            <button className="action-btn btn-primary" onClick={()=>setWizardOpen(true)} style={{padding:'6px 12px'}}>+ Install New Microapp</button>
          </div>
        </div>
        <div className="card-body">
          <div className="reg-grid">
            {registry.map(m=>(
              <div key={m.id} className={`reg-card ${m.status==='dev'?'dev':''}`}>
                <div className="reg-card-head">
                  <div className="reg-mark" style={{background:`${m.color}18`,color:m.color,borderColor:`${m.color}55`}}>{m.icon}</div>
                  <div className="reg-info">
                    <div className="reg-name">{m.name}<span className={`reg-status-tag ${m.status}`}>{m.status.toUpperCase()}</span></div>
                    <div className="reg-tagline">{m.tagline}</div>
                    <div className="reg-meta-row">v{m.version} · {m.vendor}</div>
                  </div>
                </div>
                <div className="reg-card-body">
                  <div className="reg-spec-row"><span className="reg-spec-label">Manifest</span><span className="reg-spec-val" style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={m.manifest}>{m.manifest}</span></div>
                  <div className="reg-spec-row"><span className="reg-spec-label">Deployed</span><span className="reg-spec-val">{m.deployedAt}</span></div>
                  <div className="reg-spec-row"><span className="reg-spec-label">Health · Instances</span><span className="reg-spec-val" style={{color:m.health>90?'var(--green)':m.health>60?'var(--amber)':m.health===0?'var(--text-dim)':'var(--red)'}}>{m.health}% · {m.instances} pods</span></div>
                  <div className="reg-health-bar"><div className="reg-health-fill" style={{width:`${m.health}%`,background:m.health>90?'var(--green)':m.health>60?'var(--amber)':'var(--text-dim)'}}/></div>
                  <div>
                    <div style={{fontSize:9,color:'var(--text-dim)',letterSpacing:1,fontWeight:700,marginBottom:5,marginTop:4}}>RBAC ROLES</div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {m.roles.map(r=><span key={r} className="reg-binding" style={{textTransform:'capitalize'}}>{r.replace(/_/g,' ')}</span>)}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:9,color:'var(--text-dim)',letterSpacing:1,fontWeight:700,marginBottom:5}}>DATA BINDINGS</div>
                    <div className="reg-bindings">
                      <span className="reg-binding iba">⊡ IBA × {m.iba.length}</span>
                      <span className="reg-binding l2">⊡ L2 × {m.l2.length}</span>
                      {m.capabilities.slice(0,2).map(c=><span key={c} className="reg-binding">{c}</span>)}
                      {m.capabilities.length>2 && <span className="reg-binding">+{m.capabilities.length-2}</span>}
                    </div>
                  </div>
                </div>
                <div className="reg-card-foot">
                  <button className="action-btn btn-primary">Configure</button>
                  <button className="action-btn" style={{background:'var(--surface-2)',border:'1px solid var(--border)',color:'var(--text-dim)'}}>Logs</button>
                  <button className="action-btn" style={{background:'var(--surface-2)',border:'1px solid var(--border)',color:'var(--text-dim)'}}>Versions</button>
                  <button className={`action-btn ${m.status==='active'?'btn-danger':'btn-success'}`} onClick={()=>toggleStatus(m.id)}>{m.status==='active'?'Disable':'Enable'}</button>
                </div>
              </div>
            ))}
            <div className="reg-add-card" onClick={()=>setWizardOpen(true)}>
              <div className="reg-add-icon">+</div>
              <div style={{fontSize:13,fontWeight:700}}>Install New Microapp</div>
              <div style={{fontSize:11,color:'var(--text-dim)',textAlign:'center',lineHeight:1.5}}>Register a vendor module or in-house app. Configure data bindings, roles & deploy without redeploying the shell.</div>
            </div>

      </div>
      {wizardOpen && <InstallWizard onClose={()=>setWizardOpen(false)} onInstall={installNew}/>}

  );

/* ── Install Microapp Wizard ── */
function InstallWizard({onClose, onInstall}) {
  const [step, setStep] = useState(0);
  const [draft, setDraft] = useState({
    id:'', name:'', tagline:'', version:'1.0.0', vendor:'In-house — Emirates Steel Digital',
    icon:'⊞', color:'oklch(70% 0.2 290deg)',
    manifest:'registry.zealogics.ai/new-module/1.0.0/manifest.json',
    roles:['super_admin','plant_manager'],
    iba:[], l2:[], stage:'preview',
  });
  const STEPS = ['Identity','Data Bindings','RBAC','Review & Deploy'];
  const ICON_CHOICES = ['Q','E','G','L','M','P','R','S','⊞','⊕','⊛','◈','◆','★','▣','⚡','⚗','⇆'];
  const COLOR_CHOICES = ['#4a7fff','#ffa528','#3acc7a','#a060ff','#ff4a8a','#00d2d2','#ffd24a','#8a9bbf'];
  const update = (k,v) => setDraft(p=>({...p,[k]:v}));
  const toggleArr = (k,v) => setDraft(p=>({...p,[k]: p[k].includes(v) ? p[k].filter(x=>x!==v) : [...p[k],v]}));

  const canAdvance = step===0 ? draft.id && draft.name && draft.tagline : true;

  const finish = () => {
    onInstall({
      ...draft, mountKey:null, badge:'NEW', status:'beta', health:60, instances:0,
      deployedAt: new Date().toISOString().replace('T',' ').slice(0,16)+' GST',
      capabilities:['Stub'], subs:['Overview'], license:'EMS-DEV',
    });
  };

  return (
    <div className="wiz-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="wiz-modal">
        <div className="wiz-head">
          <div>
            <div className="wiz-title">Install New Microapp</div>
            <div className="wiz-sub">Register a module into the SteelIQ shell — runtime, no redeploy required</div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="wiz-steps">
          {STEPS.map((s,i)=>(
            <div key={s} className={`wiz-step ${i<step?'done':''} ${i===step?'active':''}`}>
              <div className="wiz-step-bar"/>
              <div className="wiz-step-label">{i+1}. {s}</div>
            </div>
          ))}
        </div>

        <div className="wiz-body">
          {step===0 && <>
            <div className="wiz-grid2">
              <div className="wiz-row"><label className="form-label">Module ID (slug)</label>
                <input className="form-input" placeholder="e.g. ladlex" value={draft.id} onChange={e=>update('id',e.target.value.replace(/\s/g,'_').toLowerCase())}/></div>
              <div className="wiz-row"><label className="form-label">Display Name</label>
                <input className="form-input" placeholder="e.g. LadleX" value={draft.name} onChange={e=>update('name',e.target.value)}/></div>
            </div>
            <div className="wiz-row"><label className="form-label">Tagline</label>
              <input className="form-input" placeholder="One-line description of the microapp" value={draft.tagline} onChange={e=>update('tagline',e.target.value)}/></div>
            <div className="wiz-grid2">
              <div className="wiz-row"><label className="form-label">Vendor</label>
                <input className="form-input" value={draft.vendor} onChange={e=>update('vendor',e.target.value)}/></div>
              <div className="wiz-row"><label className="form-label">Version</label>
                <input className="form-input" value={draft.version} onChange={e=>update('version',e.target.value)}/></div>
            </div>
            <div className="wiz-row"><label className="form-label">Manifest URL</label>
              <input className="form-input" style={{fontFamily:'var(--mono)',fontSize:11}} value={draft.manifest} onChange={e=>update('manifest',e.target.value)}/></div>
            <div className="wiz-grid2">
              <div className="wiz-row"><label className="form-label">Icon</label>
                <div className="wiz-icon-grid">{ICON_CHOICES.map(i=>(<div key={i} className={`wiz-icon-pick ${draft.icon===i?'sel':''}`} onClick={()=>update('icon',i)}>{i}</div>))}</div>
              </div>
              <div className="wiz-row"><label className="form-label">Accent Color</label>
                <div className="wiz-color-grid">{COLOR_CHOICES.map(c=>(<div key={c} className={`wiz-color-pick ${draft.color===c?'sel':''}`} style={{background:c}} onClick={()=>update('color',c)}/>))}</div>
              </div>
            </div>
          </>}

          {step===1 && <>
            <div style={{fontSize:11,color:'var(--text-dim)',lineHeight:1.6}}>Select the live channels this microapp will subscribe to. Bindings can be added or revoked at any time from the Data Sources page.</div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:'var(--blue)',letterSpacing:.5}}>IBA HISTORIAN CHANNELS</span>
                <span style={{fontSize:10,color:'var(--text-dim)'}}>{draft.iba.length} selected</span>
              </div>
              <div className="wiz-pick-grid">
                {IBA_CHANNELS.map(c=>(
                  <label key={c.tag} className={`wiz-pick ${draft.iba.includes(c.tag)?'sel':''}`}>
                    <input type="checkbox" checked={draft.iba.includes(c.tag)} onChange={()=>toggleArr('iba',c.tag)}/>
                    <span style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600}}>{c.tag}</span>
                  </label>
                ))}
              </div>
            </div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:11,fontWeight:700,color:'var(--purple)',letterSpacing:.5}}>LEVEL 2 CHANNELS</span>
                <span style={{fontSize:10,color:'var(--text-dim)'}}>{draft.l2.length} selected</span>
              </div>
              <div className="wiz-pick-grid">
                {L2_CHANNELS.map(c=>(
                  <label key={c.tag} className={`wiz-pick ${draft.l2.includes(c.tag)?'sel':''}`}>
                    <input type="checkbox" checked={draft.l2.includes(c.tag)} onChange={()=>toggleArr('l2',c.tag)}/>
                    <span style={{fontFamily:'var(--mono)',fontSize:10,fontWeight:600}}>{c.tag}</span>
                  </label>
                ))}
              </div>
            </div>
          </>}

          {step===2 && <>
            <div style={{fontSize:11,color:'var(--text-dim)',lineHeight:1.6}}>Pick the roles allowed to mount this microapp. The platform shell enforces these at route time — no UI is rendered for unauthorized roles.</div>
            <div className="wiz-pick-grid" style={{gridTemplateColumns:'repeat(2,1fr)'}}>
              {Object.entries(ROLE_LABELS).map(([k,v])=>(
                <label key={k} className={`wiz-pick ${draft.roles.includes(k)?'sel':''}`}>
                  <input type="checkbox" checked={draft.roles.includes(k)} onChange={()=>toggleArr('roles',k)}/>
                  <span>{v}</span>
                </label>
              ))}
            </div>
          </>}

          {step===3 && <>
            <div style={{padding:14,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
                <div className="reg-mark" style={{background:`${draft.color}25`,color:draft.color,borderColor:`${draft.color}66`}}>{draft.icon}</div>
                <div>
                  <div style={{fontSize:14,fontWeight:700}}>{draft.name||'Untitled'} <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text-dim)',marginLeft:6}}>v{draft.version}</span></div>
                  <div style={{fontSize:11,color:'var(--text-dim)'}}>{draft.tagline||'No description'}</div>
                </div>
              </div>
              {[
                {l:'Module ID',v:draft.id||'—'},
                {l:'Vendor',v:draft.vendor},
                {l:'Manifest',v:draft.manifest},
                {l:'IBA Bindings',v:`${draft.iba.length} channels`},
                {l:'L2 Bindings',v:`${draft.l2.length} channels`},
                {l:'Roles',v:draft.roles.map(r=>ROLE_LABELS[r]).join(', ')},
              ].map(r=>(
                <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',fontSize:11,borderBottom:'1px solid var(--surface-2)'}}>
                  <span style={{color:'var(--text-dim)'}}>{r.l}</span>
                  <span style={{fontFamily:'var(--mono)',color:'var(--text-mid)',maxWidth:380,textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.v}</span>
                </div>
              ))}
              <div style={{marginTop:12,padding:'10px 12px',background:'var(--blue-lo)',border:'1px solid rgba(50,110,255,.2)',borderRadius:6,fontSize:11,color:'var(--text-mid)',lineHeight:1.5}}>
                ℹ On deploy the shell will pull the manifest, mount the bundle into a sandboxed slot, and announce the module to the AI assistant. No redeploy of the shell is required.
              </div>
            </div>
          </>}
        </div>

        <div className="wiz-foot">
          <button className="action-btn" style={{padding:'8px 16px',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-dim)',cursor:'pointer',fontSize:11}}
            onClick={()=>step===0?onClose():setStep(s=>s-1)}>{step===0?'Cancel':'← Back'}</button>
          {step<STEPS.length-1
            ? <button className="action-btn btn-primary" style={{padding:'8px 18px',fontSize:11}} disabled={!canAdvance} onClick={()=>setStep(s=>s+1)}>Next →</button>
            : <button className="action-btn btn-success" style={{padding:'8px 18px',fontSize:11}} onClick={finish}>Deploy Microapp ✓</button>}
        </div>
      </div>
    </div>
  );
}

/* ── Platform Architecture diagram ── */
function PlatformArchitecture({registry}) {
  const live = registry.filter(m=>m.status==='active');
  const planned = registry.filter(m=>m.status!=='active');
  return (
    <div className="content">
      <div className="card">
        <div className="card-header">
          <div className="card-title"><span className="badge badge-ad">ARCH</span>SteelIQ Microapps Topology</div>
          <span style={{fontSize:10,color:'var(--text-dim)'}}>Host shell · Microapp slots · Data layer</span>
        </div>
        <div className="card-body arch-card">
          <div className="arch-svg-wrap">
            <svg viewBox="0 0 1100 480" style={{width:'100%',minWidth:780,display:'block'}}>
              {/* Layer labels */}
              <text x="20" y="34" fill="var(--text-dim)" fontSize="9" letterSpacing="2" fontWeight="700">SHELL TIER</text>
              <text x="20" y="180" fill="var(--text-dim)" fontSize="9" letterSpacing="2" fontWeight="700">MICROAPP TIER</text>
              <text x="20" y="380" fill="var(--text-dim)" fontSize="9" letterSpacing="2" fontWeight="700">DATA TIER</text>

              {/* Shell box */}
              <rect x="120" y="20" width="860" height="80" rx="10" fill="rgba(50,110,255,0.05)" stroke="rgba(50,110,255,0.35)" strokeWidth="1.2"/>
              <text x="550" y="45" textAnchor="middle" fill="var(--blue)" fontSize="14" fontWeight="700">SteelIQ Platform Shell</text>
              <text x="550" y="62" textAnchor="middle" fill="var(--text-mid)" fontSize="10">React Host · Authn · RBAC Router · Telemetry · AI Bus · Notifications</text>
              <text x="550" y="78" textAnchor="middle" fill="var(--text-dim)" fontSize="9" fontFamily="'JetBrains Mono',monospace">v3.2.0 · @steeliq/platform-shell</text>
              <line x1="550" y1="100" x2="550" y2="125" stroke="var(--surface-3)" strokeWidth="1" strokeDasharray="3 3"/>

              {/* Microapp slots row */}
              {[...live, ...planned].slice(0,6).map((m,i,arr) => {
                const total = arr.length;
                const slotW = 140, gap = 16;
                const totalW = total*slotW + (total-1)*gap;
                const startX = (1100-totalW)/2;
                const x = startX + i*(slotW+gap);
                const isPlanned = m.status!=='active';
                return (
                  <g key={m.id}>
                    {/* Connector to shell */}
                    <line x1={x+slotW/2} y1={125} x2={x+slotW/2} y2={155} stroke={isPlanned?'rgba(255,255,255,0.1)':m.color} strokeWidth={isPlanned?'1':'1.5'} strokeDasharray={isPlanned?'3 3':'none'} strokeOpacity={isPlanned?.4:.6}/>
                    {/* Card */}
                    <rect x={x} y={155} width={slotW} height={110} rx="9" fill="var(--bg2)" stroke={m.color} strokeWidth="1.3" strokeOpacity={isPlanned?.35:.7}/>
                    {isPlanned && <rect x={x} y={155} width={slotW} height={110} rx="9" fill="url(#hatch)" opacity=".35"/>}
                    {/* Icon */}
                    <rect x={x+10} y={167} width="24" height="24" rx="6" fill={`${m.color}25`} stroke={m.color} strokeWidth="1" strokeOpacity=".7"/>
                    <text x={x+22} y={184} textAnchor="middle" fill={m.color} fontSize="12" fontWeight="800">{m.icon}</text>
                    {/* Name */}
                    <text x={x+42} y={177} fill="var(--text)" fontSize="12" fontWeight="700">{m.name}</text>
                    <text x={x+42} y={189} fill="var(--text-dim)" fontSize="9" fontFamily="'JetBrains Mono',monospace">v{m.version}</text>
                    {/* Status pill */}
                    <rect x={x+10} y={202} width={slotW-20} height="16" rx="3" fill={isPlanned?'rgba(255,165,40,0.1)':'rgba(50,200,110,0.1)'} stroke={isPlanned?'rgba(255,165,40,0.3)':'rgba(50,200,110,0.3)'}/>
                    <text x={x+slotW/2} y={213} textAnchor="middle" fill={isPlanned?'var(--amber)':'var(--green)'} fontSize="9" fontWeight="700" letterSpacing="1">{m.status.toUpperCase()}</text>
                    {/* Bindings */}
                    <text x={x+10} y={233} fill="var(--text-dim)" fontSize="9">IBA × {m.iba.length}</text>
                    <text x={x+10} y={247} fill="var(--text-dim)" fontSize="9">L2 × {m.l2.length}</text>
                    <text x={x+slotW-10} y={233} textAnchor="end" fill={m.color} fontSize="9" fontFamily="'JetBrains Mono',monospace">{m.health}%</text>
                    <text x={x+slotW-10} y={247} textAnchor="end" fill="var(--text-dim)" fontSize="9">{m.instances} pod{m.instances!==1?'s':''}</text>
                    {/* Connector down */}
                    <line x1={x+slotW/2} y1={265} x2={x+slotW/2} y2={335} stroke={isPlanned?'var(--surface-3)':m.color} strokeWidth="1" strokeOpacity={isPlanned?.3:.45} strokeDasharray={isPlanned?'4 3':'2 4'}>
                      {!isPlanned && <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="1s" repeatCount="indefinite"/>}
                    </line>
                  </g>

    ALL_MODULES_FLAT.forEach(m => {

      if (!g[m.mod]) g[m.mod] = { mod:m.mod, label: m.mod==='overview'?'Command Center':m.mod==='q'?'Quality — CastX':m.mod==='e'?'Electrical — EAF':m.mod==='g'?'Gas — DRI':m.mod==='admin'?'Administration':'Alerts', icon:m.icon, color:m.color, isCls:m.isCls, items:[] };
      g[m.mod].items.push(m);
    });
    return Object.values(g);
  }, []);

  const QUICK_PROMPTS = ['Web crack risk analysis','EAF energy breakdown','Gas consumption status','Electrode health check','Metallization forecast','Active alerts summary','Yield optimization','CastX module overview'];

  const INSIGHTS = [
    {sev:'crit',title:'Strand 2 — Web Crack 63%',desc:'Tundish superheat 31°C. Reduce by 8°C immediately.',mod:'q',sub:'Defect Prediction'},
    {sev:'crit',title:'Electrode Set B Critical',desc:'32% health. Replacement in 3h 40min. Stage unit now.',mod:'e',sub:'Predictive Maintenance'},
    {sev:'warn',title:'EAF Over Target +5.6%',desc:'412 kWh/t vs 390 target. Increase DRI to 72%.',mod:'e',sub:'Energy Optimization'},
    {sev:'warn',title:'Zone 3 Pressure Anomaly',desc:'0.61 bar — above 0.55 limit. Check distributor.',mod:'g',sub:'Anomaly Detection'},
    {sev:'ok',title:'Metallization On Track',desc:'92.4% — above 91% target. Forecast improving.',mod:'g',sub:'Metallization Prediction'},
    {sev:'ok',title:'AI Charge Mix Applied',desc:'DRI 71% ratio saving 12 kWh/ton this heat.',mod:'e',sub:'Charge Mix'},
  ];

  const sevColor = s => s==='crit'?'var(--red)':s==='warn'?'var(--amber)':'var(--green)';

  return (
    <>
      {/* Collapsed tab */}
      {!open && (
        <div className="ai-tab" onClick={onClose} title="Open SteelIQ AI Assistant">
          <div className="ai-tab-icon">✦</div>
          <div className="ai-tab-label">AI Assistant</div>
          <div style={{width:20,height:20,borderRadius:'50%',background:'var(--red)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:'#fff',border:'2px solid var(--bg2)',marginTop:4}}>3</div>
        </div>
      )}

      {/* Expanded panel */}
      <div className={`ai-panel${open?' open':''}`}>
        {/* Header */}
        <div className="ai-panel-header">
          <div className="ai-panel-title">
            <div className="ai-panel-name">
              <span style={{fontSize:16,animation:'ai-pulse 3s infinite'}}>✦</span>
              <span>SteelIQ <span style={{color:'var(--purple)'}}>AI</span> Assistant</span>
            </div>
            <button className="ai-close" onClick={onClose}>×</button>
          </div>
          <div className="ai-panel-sub">{ALL_MODULES_FLAT.length} modules · 3 critical alerts · Heat #2847 active</div>
        </div>

        {/* Search / Ask */}
        <div className="ai-search-wrap">
          <div className="ai-search">
            <span style={{color:'var(--purple)',fontSize:14,flexShrink:0}}>⌘</span>
            <input ref={inputRef} className="ai-search-input" placeholder="Ask anything about the plant…" value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ask()}/>
            <button className="ai-ask-btn" onClick={()=>ask()}>Ask</button>
          </div>
          {/* Quick prompts */}
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginTop:7}}>
            {QUICK_PROMPTS.map(p=>(
              <span key={p} style={{fontSize:9,padding:'2px 8px',borderRadius:12,background:'rgba(160,80,255,0.08)',border:'1px solid rgba(160,80,255,0.18)',color:'var(--purple)',cursor:'pointer',transition:'all .15s',whiteSpace:'nowrap'}}
                onClick={()=>{setQuery(p);ask(p)}}>{p}</span>
            ))}
          </div>
          {/* Result */}
          {loading && (
            <div className="ai-thinking">
              {[0,1,2].map(i=><div key={i} className="ai-thinking-dot" style={{animationDelay:`${i*.15}s`}}/>)}
              <span style={{fontSize:10,color:'var(--text-dim)',marginLeft:4}}>Analyzing plant data…</span>
            </div>
          )}
          {result && (
            <div className="ai-result-box">
              <div className="ai-result-hd"><span>✦</span><span>AI Response</span></div>
              <div className="ai-result-body">{result.split('\n').map((l,i)=><div key={i} style={{marginBottom:l.startsWith('•')?3:0}}>{l}</div>)}</div>
            </div>
          )}
        </div>

        {/* Tabs */}
        <div style={{display:'flex',borderBottom:'1px solid rgba(160,80,255,0.12)',flexShrink:0}}>
          {[{id:'nav',label:`All Modules (${ALL_MODULES_FLAT.length})`},{id:'insights',label:'AI Insights'}].map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flex:1,padding:'9px 12px',background:'none',border:'none',borderBottom:`2px solid ${activeTab===t.id?'var(--purple)':'transparent'}`,color:activeTab===t.id?'var(--purple)':'var(--text-dim)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'var(--sans)',transition:'all .2s'}}>{t.label}</button>
          ))}
        </div>

        {/* Body */}
        <div className="ai-body">
          {activeTab==='nav' && <>
            {/* Filter */}
            <div style={{padding:'8px 14px',flexShrink:0}}>
              <input style={{width:'100%',background:'var(--surface-2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--mono)',fontSize:11,outline:'none'}} placeholder="Filter modules…" value={filter} onChange={e=>setFilter(e.target.value)}/>
            </div>

            {filter ? (
              /* Flat search results */
              <>
                <div className="ai-section-head"><div className="ai-section-label">Search Results</div><div className="ai-section-count">{filtered.length}</div></div>
                {filtered.map((m,i)=>(
                  <div key={i} className={`ai-sub-item${activeModule===m.mod&&activeSub===m.sub?' active':''}`}
                    style={{paddingLeft:14}} onClick={()=>{setModule(m.mod,m.sub);setFilter('');}}>
                    <div style={{width:20,height:20,borderRadius:5,background:`${m.color}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,color:m.color,flexShrink:0}}>{m.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,fontWeight:600,color:'var(--text-mid)'}}>{m.label}</div>
                      <div style={{fontSize:9,color:'var(--text-dim)'}}>{m.points[0]?.t}</div>
                    </div>
                  </div>
                ))}
              </>
            ) : (
              /* Grouped tree */
              groups.map(g=>(
                <div key={g.mod} className="ai-module-group">
                  <div className={`ai-module-head${activeModule===g.mod?' active-group':''}`}
                    onClick={()=>setExpanded(p=>({...p,[g.mod]:!p[g.mod]}))}>
                    <div className={`ai-module-icon ${g.isCls}`} style={{background:`${g.color}18`,color:g.color}}>{g.icon}</div>
                    <div className="ai-module-label" style={{color:activeModule===g.mod?'var(--text)':'var(--text-mid)'}}>{g.label}</div>
                    <div style={{fontSize:9,color:'var(--text-dim)',marginRight:4}}>{g.items.length}</div>
                    <div className={`ai-mod-chevron${expanded[g.mod]?' open':''}`}>▶</div>
                  </div>
                  <div className={`ai-sub-list${expanded[g.mod]?' open':''}`}>
                    {g.items.map((item,ii)=>(
                      <div key={ii}>
                        <div className={`ai-sub-item${activeModule===item.mod&&activeSub===item.sub?' active':''}`}
                          onClick={()=>setModule(item.mod, item.sub)}>
                          <div className="ai-sub-dot"/>
                          <div className="ai-sub-label" style={{color:activeModule===item.mod&&activeSub===item.sub?item.color:'var(--text-mid)'}}>{item.label}</div>
                        </div>
                        {/* Key points expanded */}
                        {activeModule===item.mod&&activeSub===item.sub && item.points.map((pt,pi)=>(
                          <div key={pi} style={{padding:'5px 14px 5px 60px',background:'rgba(160,80,255,0.03)',borderLeft:'2px solid rgba(160,80,255,0.12)'}}>
                            <div style={{fontSize:10,fontWeight:600,color:item.color,marginBottom:1}}>→ {pt.t}</div>
                            <div style={{fontSize:9,color:'var(--text-dim)',lineHeight:1.4}}>{pt.d}</div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </>}

          {activeTab==='insights' && <>
            <div className="ai-section-head"><div className="ai-section-label">AI-Generated Insights</div><div className="ai-section-count">6</div></div>
            <div style={{padding:'4px 0'}}>
              {INSIGHTS.map((ins,i)=>(
                <div key={i} className="ai-insight-card" onClick={()=>setModule(ins.mod,ins.sub)}>
                  <div className="ai-insight-head">
                    <div className="ai-insight-sev" style={{background:sevColor(ins.sev),boxShadow:`0 0 6px ${sevColor(ins.sev)}66`}}/>
                    <div className="ai-insight-title" style={{color:sevColor(ins.sev)}}>{ins.title}</div>
                    <span style={{marginLeft:'auto',fontSize:9,color:'var(--text-dim)',fontFamily:'var(--mono)'}}>{ins.mod.toUpperCase()}</span>
                  </div>
                  <div className="ai-insight-desc">{ins.desc}</div>
                </div>
              ))}
            </div>
            {/* Live data snapshot */}
            <div className="ai-section-head" style={{marginTop:4}}><div className="ai-section-label">Live Plant Snapshot</div></div>
            <div style={{padding:'0 14px 14px',display:'flex',flexDirection:'column',gap:6}}>
              {[
                {l:'Tundish Temp',v:`${liveData.tundishTemp.toFixed(0)}°C`,c:Math.abs(liveData.tundishTemp-1545)<15?'var(--green)':'var(--red)'},
                {l:'EAF Energy',v:`${liveData.eafKwh.toFixed(0)} kWh/t`,c:liveData.eafKwh<400?'var(--green)':'var(--amber)'},
                {l:'Metallization',v:`${liveData.metallization.toFixed(1)}%`,c:liveData.metallization>91?'var(--green)':'var(--amber)'},
                {l:'Arc Stability',v:`${liveData.arcStability.toFixed(0)}%`,c:liveData.arcStability>85?'var(--green)':'var(--amber)'},
                {l:'Gas Flow',v:`${(liveData.gasFlow/1000).toFixed(1)}k Nm³/h`,c:'var(--text-mid)'},
                {l:'Yield',v:`${liveData.yieldPct.toFixed(1)}%`,c:'var(--green)'},
              ].map(kv=>(
                <div key={kv.l} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:'var(--surface-1)',borderRadius:6,border:'1px solid var(--surface-2)'}}>
                  <span style={{fontSize:11,color:'var(--text-dim)'}}>{kv.l}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:kv.c}}>{kv.v}</span>
                </div>
              ))}
            </div>
          </>}
        </div>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════ */
const MODULE_CONFIG = [
  {id:'overview',label:'Command Center',icon:'◈',cls:'si-ov',access:'overview'},
  {id:'q',label:'Quality — CastX',icon:'Q',cls:'si-q',badge:'Q',access:'q',subs:['Outlier Detection','Defect Prediction','Snapshot Visualization','NLP Analytics','Time-Series Prediction']},
  {id:'e',label:'Electrical — EAF',icon:'E',cls:'si-e',badge:'E',access:'e',subs:['Energy Optimization','Arc Stability','Charge Mix','Tap-to-Tap','Predictive Maintenance']},
  {id:'g',label:'Gas — DRI/DRP',icon:'G',cls:'si-g',badge:'G',access:'g',subs:['Gas Consumption','Metallization Prediction','Temperature Profile','Process Yield','Anomaly Detection']},
  {id:'admin',label:'Administration',icon:'⚙',cls:'si-ad',badge:'ADMIN',access:'admin',subs:ADMIN_SUBS},
  {id:'alerts',label:'Alerts',icon:'!',cls:'si-al',access:'alerts'},
];

function MainApp({user,onLogout,theme,setTheme}) {
  const [sbOpen,setSbOpen]=useState(true);
  const [mobileOpen,setMobileOpen]=useState(false);
  const [activeModule,setActiveModule]=useState('overview');
  const [activeSub,setActiveSub]=useState('Outlier Detection');
  const [expanded,setExpanded]=useState({q:true,e:false,g:false,admin:false});
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [aiOpen,setAiOpen]=useState(false);
  const [moduleRegistry,setModuleRegistry]=useState(MODULE_REGISTRY_SEED);
  const userMenuRef=useRef();

  useEffect(()=>{
    const check=(e)=>{ if(userMenuRef.current&&!userMenuRef.current.contains(e.target)) setShowUserMenu(false); };
    document.addEventListener('mousedown',check);return()=>document.removeEventListener('mousedown',check);
  },[]);

  // Live data
  const tundishTemp=useWave(1550,1510,1590,8);const mouldLevel=useWave(142,128,158,3);const castSpeed=useWave(1.4,1.1,1.8,.06);
  const eafKwh=useWave(408,380,440,5);const eafTemp=useWave(1618,1580,1660,10);const arcStability=useWave(87,72,98,2);
  const gasFlow=useWave(28400,26000,31000,400);const metallization=useWave(92.3,88,96,.4);const tapTime=useWave(44,38,52,1);
  const yieldPct=useWave(94.2,91,97,.3);const defectRisk=useWave(61,45,78,4);
  const qScore=Math.round(clamp(92-(tundishTemp-1545)*.3,70,99));
  const eScore=Math.round(clamp(100-(eafKwh-390)*.5,60,99));
  const gScore=Math.round(clamp(metallization*1.02,70,99));
  const liveData={tundishTemp,mouldLevel,castSpeed,eafKwh,eafTemp,arcStability,gasFlow,metallization,tapTime,yieldPct,qScore,eScore,gScore,defectRisk};

  const setModule=(mod,sub)=>{
    if(!canAccess(user.role,mod)) return;
    setActiveModule(mod);if(sub) setActiveSub(sub);
    setExpanded(p=>({...p,[mod]:true}));setMobileOpen(false);
  };

  const visibleModules=MODULE_CONFIG.filter(m=>canAccess(user.role,m.access));
  const curModule=MODULE_CONFIG.find(m=>m.id===activeModule);
  const curSubs=curModule?.subs||[];
  const subColorCls=activeModule==='q'?'active-q':activeModule==='e'?'active-e':activeModule==='g'?'active-g':activeModule==='admin'?'active-ad':'active-q';

  const roleColors={'super_admin':'#a060ff','plant_manager':'#4a7fff','castx_operator':'#4a7fff','eaf_operator':'#ffa528','dri_operator':'#3acc7a'};
  const userColor=roleColors[user.role]||'var(--blue)';

  return (
    <div className="app" onClick={()=>showUserMenu&&setShowUserMenu(false)}>
      {/* HEADER */}
      <header className="header">
        <div className={`header-logo-zone${sbOpen?' open':''}`}>
          <button className="hamburger" onClick={()=>setMobileOpen(o=>!o)}>☰</button>
          <div className="logo-mark">SQ</div>
          {sbOpen&&<div><div className="logo-text">Steel<em>IQ</em></div><div className="logo-sub">Emirates Steel</div></div>}
          {!sbOpen&&<div style={{display:'none'}} className="logo-text-hidden"/>}
        </div>
        <div className="header-kpis">
          {[{l:'Yield',v:`${yieldPct.toFixed(1)}%`,c:yieldPct>93?'var(--green)':'var(--amber)'},{l:'EAF Energy',v:`${eafKwh.toFixed(0)} kWh/t`,c:eafKwh<400?'var(--green)':'var(--amber)'},{l:'Metallization',v:`${metallization.toFixed(1)}%`,c:metallization>91?'var(--green)':'var(--amber)'},{l:'Tundish Temp',v:`${tundishTemp.toFixed(0)}°C`,c:Math.abs(tundishTemp-1545)<15?'var(--blue)':'var(--red)'},{l:'Tap-to-Tap',v:`${tapTime.toFixed(0)} min`,c:tapTime<46?'var(--green)':'var(--amber)'}].map(m=>(
            <div key={m.l} className="hkpi"><div className="hkpi-label">{m.l}</div><div className="hkpi-val" style={{color:m.c}}>{m.v}</div></div>
          ))}
        </div>
        <div className="header-right">
          <div className="heat-tag">HEAT #2847</div>
          <div className="status-pill"><div className="sdot"/>LIVE</div>
          <Clock/>
          <div className="notif-btn" title="Notifications"><span>🔔</span><div className="notif-badge"/></div>
          <div ref={userMenuRef} style={{position:'relative'}}>
            <div className="user-btn" onClick={e=>{e.stopPropagation();setShowUserMenu(o=>!o)}}>
              <div className="user-avatar" style={{background:`${userColor}22`,border:`1px solid ${userColor}44`,color:userColor}}>{user.initials}</div>
              <div style={{display:'none'}} className="user-name-wrap">
                <div className="user-name">{user.name.split(' ')[0]}</div>
                <div className="user-role-tag">{ROLE_LABELS[user.role]}</div>
              </div>
              <span style={{fontSize:10,color:'var(--text-dim)'}}>▾</span>
            </div>
            {showUserMenu&&(
              <div className="user-dropdown" onClick={e=>e.stopPropagation()}>
                <div style={{padding:'10px 10px 8px',borderBottom:'1px solid var(--border)',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:0}}>
                    <div style={{width:32,height:32,borderRadius:8,background:`${userColor}22`,border:`1px solid ${userColor}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:userColor}}>{user.initials}</div>
                    <div><div style={{fontSize:12,fontWeight:700}}>{user.name}</div><div style={{fontSize:10,color:userColor}}>{ROLE_LABELS[user.role]}</div><div style={{fontSize:10,color:'var(--text-dim)'}}>{user.email}</div></div>
                  </div>
                </div>
                {/* Appearance / theme switch */}
                <div style={{padding:'2px 10px 8px'}}>
                  <div style={{fontSize:8.5,color:'var(--text-dim)',letterSpacing:1.2,fontWeight:700,margin:'6px 0 5px'}}>APPEARANCE</div>
                  <div style={{display:'flex',gap:3,background:'var(--surface-1)',padding:3,borderRadius:7,border:'1px solid var(--border)'}}>
                    {[{k:'light',l:'Light',icon:'☀'},{k:'dark',l:'Dark',icon:'☾'}].map(t=>(
                      <button key={t.k} onClick={e=>{e.stopPropagation();setTheme(t.k);}}
                        style={{flex:1,padding:'5px 8px',fontSize:10.5,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',gap:5,background:theme===t.k?'var(--bg2)':'transparent',border:'1px solid '+(theme===t.k?'var(--border2)':'transparent'),borderRadius:5,color:theme===t.k?'var(--text)':'var(--text-dim)',cursor:'pointer',fontFamily:'var(--sans)',transition:'all .15s',boxShadow:theme===t.k?'0 1px 2px rgba(0,0,0,0.06)':'none'}}>
                        <span style={{fontSize:12}}>{t.icon}</span>{t.l}
                      </button>
                    ))}
                  </div>
                </div>
                {[{icon:'👤',label:'My Profile'},{icon:'⚙',label:'Preferences'},{icon:'🔑',label:'Change Password'},{icon:'📊',label:'My Dashboard'}].map(it=>(
                  <div key={it.label} className="ud-item"><span>{it.icon}</span><span>{it.label}</span></div>
                ))}
                <div className="ud-divider"/>
                <div className="ud-item danger" onClick={onLogout}><span>↩</span><span>Sign Out</span></div>
              </div>
            )}
          </div>
        </div>
      </header>

      <div className="body-wrap">
        {/* MOBILE OVERLAY */}
        {mobileOpen&&<div className="sidebar-overlay" onClick={()=>setMobileOpen(false)}/>}

        {/* SIDEBAR */}
        <nav className={`sidebar${!sbOpen?' closed':''}${mobileOpen?' mobile-open':''}`}>
          <div className="sb-toggle-row">
            <button className="sb-toggle-btn" onClick={()=>setSbOpen(o=>!o)}>{sbOpen?'◁':'▷'}</button>
          </div>
          <div className="sb-nav">
            {visibleModules.map((m,idx)=>(
              <div key={m.id}>
                {idx>0&&idx<visibleModules.length&&m.id!=='alerts'&&<div className="sb-divider"/>}
                <button className={`sb-item${activeModule===m.id?' active':''}`}
                  onClick={()=>{setActiveModule(m.id);if(m.subs){setExpanded(p=>({...p,[m.id]:!p[m.id]}));if(m.subs[0]) setActiveSub(m.subs[0]);}setMobileOpen(false);}}>
                  <div className={`sb-icon-wrap ${m.cls}`}>{m.icon}</div>
                  {sbOpen&&<>
                    <span className="sb-label">{m.label}</span>
                    {m.badge&&<span className="sb-badge" style={{background:`var(--${m.cls.split('-')[1]==='q'?'blue':m.cls.split('-')[1]==='e'?'amber':m.cls.split('-')[1]==='g'?'green':m.cls.split('-')[1]==='ad'?'purple':'red'}-lo)`,color:`var(--${m.cls.split('-')[1]==='q'?'blue':m.cls.split('-')[1]==='e'?'amber':m.cls.split('-')[1]==='g'?'green':m.cls.split('-')[1]==='ad'?'purple':'red'})`}}>{m.badge}</span>}
                    {m.subs&&<span className={`sb-chevron${expanded[m.id]?' open':''}`}>▼</span>}
                  </>}
                </button>
                {sbOpen&&m.subs&&(
                  <div className={`sb-sub${expanded[m.id]?' open':''}`}>
                    {m.subs.map(s=>(
                      <button key={s} className={`sb-sub-btn${activeSub===s&&activeModule===m.id?' active':''}`}
                        onClick={()=>{setActiveModule(m.id);setActiveSub(s);setExpanded(p=>({...p,[m.id]:true}));setMobileOpen(false);}}>
                        {s}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
          {/* Sidebar bottom user */}
          <div className="sb-bottom">
            {sbOpen?(
              <div className="sb-user" onClick={()=>setShowUserMenu(o=>!o)}>
                <div style={{width:30,height:30,borderRadius:7,background:`${userColor}22`,border:`1px solid ${userColor}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:userColor,flexShrink:0}}>{user.initials}</div>
                <div className="sb-user-info"><div className="sb-user-name">{user.name}</div><div className="sb-user-role">{ROLE_LABELS[user.role]}</div></div>
                <button className="sb-logout" onClick={e=>{e.stopPropagation();onLogout()}} title="Sign out">↩</button>
              </div>
            ):(
              <div style={{display:'flex',justifyContent:'center',padding:'4px 0'}}>
                <div style={{width:30,height:30,borderRadius:7,background:`${userColor}22`,border:`1px solid ${userColor}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:userColor,cursor:'pointer'}} onClick={onLogout} title="Sign out">{user.initials}</div>
              </div>
            )}
          </div>
        </nav>

        {/* MAIN */}
        <div className="main">
          {(() => {
            const reg = moduleRegistry.find(m => m.mountKey === activeModule);
            if (!reg) return null;
            const isBeta = reg.status !== 'active';
            return (
              <div className="microapp-bar" data-screen-label={`microapp:${reg.id}`}>
                <div className="ma-id">
                  <div className="ma-mark" style={{background:`${reg.color}20`,color:reg.color,borderColor:`${reg.color}60`}}>{reg.icon}</div>
                  <div style={{minWidth:0}}>
                    <div className="ma-name">{reg.name}<span className="ma-ver">v{reg.version}</span>{isBeta && <span className="ma-chip beta" style={{padding:'1px 6px',fontSize:8.5}}>{reg.status.toUpperCase()}</span>}</div>
                    <div className="ma-vendor">{reg.tagline} · {reg.vendor}</div>
                  </div>
                </div>
                <div className="ma-bindings">
                  <span className="ma-chip iba" title={reg.iba.join(', ')}>⊡ IBA · {reg.iba.length} tags</span>
                  <span className="ma-chip l2" title={reg.l2.join(', ')}>⊡ L2 · {reg.l2.length} channels</span>
                  <span className="ma-chip health"><div className="ma-dot"/>Health {reg.health}%</span>
                  <div className="ma-actions">
                    <button className="ma-iconbtn" title="Module logs">≡</button>
                    <button className="ma-iconbtn" title="Module settings" onClick={()=>{setActiveModule('admin');setActiveSub('Module Registry');}}>⚙</button>
                  </div>
                </div>
              </div>
            );
          })()}
          {curSubs.length>0&&(
            <div className="submod-tabs">
              {curSubs.map(s=>(
                <button key={s} className={`sm-tab${activeSub===s&&activeModule===curModule.id?' '+subColorCls:''}`} onClick={()=>setActiveSub(s)}>{s}</button>
              ))}
            </div>
          )}
          {activeModule==='overview'&&<OverviewView data={liveData} setModule={setModule} user={user}/>}
          {activeModule==='q'&&<CastXView sub={activeSub} data={liveData}/>}
          {activeModule==='e'&&<EAFView sub={activeSub} data={liveData}/>}
          {activeModule==='g'&&<DRIView sub={activeSub} data={liveData}/>}
          {activeModule==='admin'&&<AdminView sub={activeSub} currentUser={user} moduleRegistry={moduleRegistry} setModuleRegistry={setModuleRegistry}/>}
          {activeModule==='alerts'&&<AlertsView/>}
        </div>
      </div>

      {/* AI ASSISTANT */}
      <AIPanel
        open={aiOpen}
        onClose={()=>setAiOpen(o=>!o)}
        setModule={(mod,sub)=>{setModule(mod,sub);setAiOpen(false);}}
        activeModule={activeModule}
        activeSub={activeSub}
        liveData={liveData}
      />
    </div>
  );
}

/* ══════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════ */
function Root() {
  const [user,setUser]=useState(()=>{try{const s=localStorage.getItem('steeliq_user');return s?JSON.parse(s):null;}catch{return null;}});
  // view: 'landing' | 'login' | (when user is set, MainApp renders regardless of view)
  const [view,setView]=useState(()=>user?'app':'landing');
  const [theme,setThemeState]=useState(()=>{try{return localStorage.getItem('steeliq_theme')||'light';}catch{return 'light';}});
  const setTheme=(t)=>{setThemeState(t);try{localStorage.setItem('steeliq_theme',t);}catch{}};
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);
  const login=(u)=>{setUser(u);setView('app');};
  const logout=()=>{localStorage.removeItem('steeliq_user');setUser(null);setView('landing');};

  if(user) return <MainApp user={user} onLogout={logout} theme={theme} setTheme={setTheme}/>;
  if(view==='login') return <LoginScreen onLogin={login} onBack={()=>setView('landing')}/>;
  // Default: marketing landing page
  if(window.LandingPage) return <window.LandingPage onLogin={()=>setView('login')}/>;
  // Fallback if landing.jsx hasn't loaded yet — show login directly
  return <LoginScreen onLogin={login}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
