<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── LIGHT THEME (default) ── */
  --bg:#f4f6fb;--bg2:#ffffff;--bg3:#f7f9fc;--bg4:#eef2f8;
  --border:rgba(20,40,100,0.1);--border2:rgba(20,40,100,0.18);
  --blue:oklch(52% 0.22 248deg);--blue-lo:rgba(40,90,220,0.08);
  --amber:oklch(58% 0.18 60deg);--amber-lo:rgba(190,110,20,0.1);
  --green:oklch(48% 0.16 155deg);--green-lo:rgba(30,140,80,0.09);
  --purple:oklch(54% 0.22 290deg);--purple-lo:rgba(120,60,200,0.09);
  --red:oklch(54% 0.22 25deg);--red-lo:rgba(200,40,40,0.08);
  --text:#0f1a30;--text-dim:#7a8aac;--text-mid:#475472;
  --surface-1:rgba(20,40,100,0.04);
  --surface-2:rgba(20,40,100,0.07);
  --surface-3:rgba(20,40,100,0.1);
  --track:rgba(20,40,100,0.09);
  --overlay:rgba(15,20,40,0.55);
  --header-bg:rgba(255,255,255,0.94);
  --sidebar-bg:rgba(255,255,255,0.97);
  --tabs-bg:rgba(244,247,252,0.65);
  --ai-bg:rgba(255,255,255,0.97);
  --ai-bg-sticky:rgba(255,255,255,0.94);
  --card-shadow:0 1px 2px rgba(20,40,100,0.04),0 4px 12px rgba(20,40,100,0.05);
  --grid-line:rgba(20,40,100,0.05);
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
  --header-h:56px;--sb-open:230px;--sb-closed:54px;
  --radius:10px;--radius-sm:7px;
}
[data-theme="dark"]{
  /* ── DARK THEME ── */
  --bg:#060a12;--bg2:#0b1120;--bg3:#111928;--bg4:#161f30;
  --border:rgba(80,130,255,0.11);--border2:rgba(80,130,255,0.22);
  --blue:oklch(65% 0.22 248deg);--blue-lo:rgba(50,110,255,0.12);
  --amber:oklch(72% 0.19 65deg);--amber-lo:rgba(255,165,40,0.1);
  --green:oklch(68% 0.18 155deg);--green-lo:rgba(50,200,110,0.1);
  --purple:oklch(70% 0.2 290deg);--purple-lo:rgba(160,80,255,0.1);
  --red:oklch(62% 0.22 25deg);--red-lo:rgba(255,50,50,0.1);
  --text:#e8edf8;--text-dim:#5a6a8a;--text-mid:#8a9bbf;
  --surface-1:rgba(255,255,255,0.03);
  --surface-2:rgba(255,255,255,0.05);
  --surface-3:rgba(255,255,255,0.08);
  --track:rgba(255,255,255,0.05);
  --overlay:rgba(0,0,0,0.6);
  --header-bg:rgba(6,10,18,0.96);
  --sidebar-bg:rgba(6,10,18,0.97);
  --tabs-bg:rgba(8,12,22,0.6);
  --ai-bg:rgba(8,10,20,0.97);
  --ai-bg-sticky:rgba(8,10,20,0.95);
  --card-shadow:none;
  --grid-line:rgba(50,100,255,0.025);
}
html,body,#root{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(80,130,255,0.2);border-radius:2px}

/* ── LOGIN ── */
.login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;overflow:hidden}
.login-bg{position:absolute;inset:0;background:url('uploads/steelIQ_image_poster.jpg') center/cover no-repeat;filter:brightness(.28) saturate(1.4)}
.login-bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,10,18,0.92) 0%,rgba(20,10,40,0.7) 100%)}
.login-card{position:relative;z-index:2;width:420px;max-width:calc(100vw - 32px);background:rgba(11,17,32,0.85);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;backdrop-filter:blur(24px);box-shadow:0 32px 80px var(--overlay),0 0 0 1px rgba(80,130,255,0.08)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(140deg,var(--blue),oklch(55% 0.22 220deg));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;box-shadow:0 0 24px oklch(65% 0.22 248deg / 0.45)}
.login-logo-text{font-size:22px;font-weight:700;letter-spacing:-.5px}
.login-logo-text em{color:var(--blue);font-style:normal}
.login-logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text-dim);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;color:var(--text-mid);letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;background:var(--surface-2);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,110,255,0.12)}
.form-input::placeholder{color:var(--text-dim)}
.login-btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blue),oklch(60% 0.22 230deg));color:#fff;border:none;cursor:pointer;font-family:var(--sans);transition:all .2s;letter-spacing:.3px;margin-top:4px;box-shadow:0 4px 20px rgba(50,110,255,0.3)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(50,110,255,0.4)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-error{background:var(--red-lo);border:1px solid rgba(255,50,50,.25);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--red);margin-top:12px}
.demo-accounts{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.demo-title{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.demo-grid{display:flex;flex-direction:column;gap:5px}
.demo-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;background:var(--surface-1);border:1px solid var(--surface-2);cursor:pointer;transition:all .15s}
.demo-item:hover{background:rgba(50,110,255,0.08);border-color:rgba(50,110,255,0.2)}
.demo-avatar{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.demo-info{flex:1}
.demo-name{font-size:11px;font-weight:600}
.demo-role{font-size:9px;color:var(--text-dim)}
.demo-creds{font-family:var(--mono);font-size:9px;color:var(--text-dim);opacity:.6}

/* ── APP LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;overflow:hidden}
.body-wrap{display:flex;flex:1;overflow:hidden}

/* ── HEADER ── */
.header{height:var(--header-h);display:flex;align-items:center;padding:0 16px 0 0;border-bottom:1px solid var(--border);background:var(--header-bg);backdrop-filter:blur(16px);flex-shrink:0;gap:0;z-index:50;position:relative}
.header-logo-zone{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--border);flex-shrink:0;min-width:var(--sb-closed);transition:min-width .28s;overflow:hidden}
.header-logo-zone.open{min-width:var(--sb-open)}
.logo-mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(140deg,var(--blue),oklch(55% 0.22 220deg));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;box-shadow:0 0 16px oklch(65% 0.22 248deg / 0.35);flex-shrink:0}
.logo-text{font-size:16px;font-weight:700;white-space:nowrap;letter-spacing:-.3px}
.logo-text em{color:var(--blue);font-style:normal}
.logo-sub{font-size:9px;color:var(--text-dim);letter-spacing:1.8px;text-transform:uppercase}
.hamburger{padding:6px;border-radius:6px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;display:none;align-items:center;margin-left:8px}
.header-kpis{display:flex;align-items:center;flex:1;padding:0 16px;gap:0;overflow:hidden}
.hkpi{padding:0 16px;border-right:1px solid var(--border);flex-shrink:0}
.hkpi:first-child{padding-left:0}
.hkpi-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.hkpi-val{font-family:var(--mono);font-size:14px;font-weight:600}
.header-right{display:flex;align-items:center;gap:10px;padding-left:12px;flex-shrink:0}
.status-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(50,200,100,0.07);border:1px solid rgba(50,200,100,0.2);font-size:10px;color:var(--green);font-weight:500;white-space:nowrap}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pgn 2s infinite}
@keyframes pgn{0%,100%{box-shadow:0 0 0 0 rgba(50,200,100,0.5)}50%{box-shadow:0 0 0 5px rgba(50,200,100,0)}}
.heat-tag{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--amber-lo);border:1px solid rgba(255,165,40,0.25);color:var(--amber);white-space:nowrap}
.clock-tag{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap}
/* User menu */
.user-btn{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative}
.user-btn:hover{background:var(--surface-3);border-color:var(--border2)}
.user-avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.user-name{font-size:11px;font-weight:600;white-space:nowrap}
.user-role-tag{font-size:9px;color:var(--text-dim)}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:200px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:6px;box-shadow:0 16px 48px rgba(0,0,0,0.5);z-index:200;backdrop-filter:blur(16px)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text-mid);transition:all .15s}
.ud-item:hover{background:var(--surface-2);color:var(--text)}
.ud-item.danger:hover{background:var(--red-lo);color:var(--red)}
.ud-divider{height:1px;background:var(--border);margin:4px 0}
.notif-btn{width:32px;height:32px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:14px;position:relative;transition:all .2s}
.notif-btn:hover{background:var(--surface-3);color:var(--text)}
.notif-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1px solid var(--bg)}

/* ── SIDEBAR ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;backdrop-filter:blur(2px)}
.sidebar{width:var(--sb-open);flex-shrink:0;border-right:1px solid var(--border);background:var(--sidebar-bg);display:flex;flex-direction:column;transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:41;position:relative}
.sidebar.closed{width:var(--sb-closed)}
.sb-toggle-row{height:42px;display:flex;align-items:center;justify-content:flex-end;padding:0 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-toggle-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:5px 7px;border-radius:5px;font-size:12px;transition:all .2s}
.sb-toggle-btn:hover{background:var(--surface-3);color:var(--text)}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.sb-item{width:100%;display:flex;align-items:center;gap:10px;padding:8px 11px;background:none;border:none;cursor:pointer;color:var(--text-dim);transition:all .18s;white-space:nowrap;text-align:left}
.sb-item:hover{color:var(--text);background:var(--surface-2)}
.sb-item.active{color:var(--text);background:var(--surface-2)}
.sb-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s;font-weight:700}
.si-ov{background:var(--surface-3);color:var(--text-mid)}
.si-q{background:var(--blue-lo);color:var(--blue)}
.si-e{background:var(--amber-lo);color:var(--amber)}
.si-g{background:var(--green-lo);color:var(--green)}
.si-ad{background:var(--purple-lo);color:var(--purple)}
.si-al{background:var(--red-lo);color:var(--red)}
.sb-label{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis}
.sb-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.8px;flex-shrink:0}
.sb-chevron{font-size:9px;flex-shrink:0;transition:transform .2s;opacity:.5}
.sb-chevron.open{transform:rotate(180deg)}
.sb-sub{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sb-sub.open{max-height:280px}
.sb-sub-btn{width:100%;display:flex;align-items:center;gap:8px;padding:6px 12px 6px 51px;background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-dim);transition:all .15s;text-align:left;white-space:nowrap}
.sb-sub-btn:hover{color:var(--text);background:var(--surface-1)}
.sb-sub-btn.active{color:var(--blue);background:var(--blue-lo)}
.sb-sub-btn::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.7}
.sb-divider{height:1px;background:var(--border);margin:6px 10px}
/* Sidebar bottom user zone */
.sb-bottom{border-top:1px solid var(--border);padding:10px;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;background:var(--surface-1);border:1px solid var(--border);cursor:pointer;transition:all .2s;overflow:hidden;white-space:nowrap}
.sb-user:hover{background:var(--surface-3)}
.sb-user-info{flex:1;overflow:hidden}
.sb-user-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:9px;color:var(--text-dim);letter-spacing:.3px;margin-top:1px}
.sb-logout{padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:14px;transition:all .2s;flex-shrink:0}
.sb-logout:hover{color:var(--red);background:var(--red-lo)}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.submod-tabs{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 20px;height:40px;flex-shrink:0;background:var(--tabs-bg);overflow-x:auto;gap:0}
.sm-tab{padding:0 13px;height:100%;font-size:11px;font-weight:500;color:var(--text-dim);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:all .18s;white-space:nowrap;font-family:var(--sans)}
.sm-tab:hover{color:var(--text)}
.sm-tab.active-q{color:var(--blue);border-bottom-color:var(--blue)}
.sm-tab.active-e{color:var(--amber);border-bottom-color:var(--amber)}
.sm-tab.active-g{color:var(--green);border-bottom-color:var(--green)}
.sm-tab.active-ad{color:var(--purple);border-bottom-color:var(--purple)}
.content{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--card-shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--border)}
.card-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.card-body{padding:14px}
.badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.badge-q{background:var(--blue-lo);color:var(--blue);border:1px solid rgba(50,110,255,.22)}
.badge-e{background:var(--amber-lo);color:var(--amber);border:1px solid rgba(255,165,40,.22)}
.badge-g{background:var(--green-lo);color:var(--green);border:1px solid rgba(50,200,110,.22)}
.badge-ad{background:var(--purple-lo);color:var(--purple);border:1px solid rgba(160,80,255,.22)}
.badge-ai{background:rgba(0,210,210,0.1);color:oklch(72% 0.15 190deg);border:1px solid rgba(0,210,210,.2)}
.badge-sys{background:rgba(140,160,200,0.1);color:var(--text-mid);border:1px solid rgba(140,160,200,.15)}
.live-chip{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--green);font-weight:600;letter-spacing:.8px;padding:2px 7px;border-radius:10px;background:var(--green-lo)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pgn 1.5s infinite}

/* ── GRID HELPERS ── */
.row{display:flex;gap:14px}
.col{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── METRIC BOX ── */
.metric-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.metric-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.metric-val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
.metric-sub{font-size:10px;color:var(--text-dim);margin-top:4px}
.metric-sub.ok{color:var(--green)}.metric-sub.warn{color:var(--amber)}.metric-sub.crit{color:var(--red)}

/* ── PARAM ROW ── */
.param-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.param-name{font-size:11px;color:var(--text-mid);width:145px;flex-shrink:0}
.param-track{flex:1;height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden}
.param-fill{height:100%;border-radius:3px;transition:width 1.5s ease}
.param-val{font-family:var(--mono);font-size:11px;width:72px;text-align:right;flex-shrink:0}

/* ── SPARKLINE ── */
.spark-svg{display:block;width:100%;overflow:visible}

/* ── ALERT ITEMS ── */
.alert-item{padding:9px 11px;border-radius:7px;border-left:2px solid;margin-bottom:6px;background:var(--surface-1)}
.alert-item.crit{border-color:var(--red);animation:apulse 2.5s infinite}
.alert-item.warn{border-color:var(--amber)}
.alert-item.info{border-color:var(--blue)}
@keyframes apulse{0%,100%{background:rgba(255,50,50,0.02)}50%{background:rgba(255,50,50,0.07)}}
.alert-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.alert-title{font-size:11px;font-weight:600}
.alert-time{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.alert-desc{font-size:10px;color:var(--text-mid);line-height:1.5}

/* ── GAUGE ── */
.gauge-row{display:flex;justify-content:space-around;align-items:center}
.gauge-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.gauge-sublabel{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;text-align:center}

/* ── NLP ── */
.nlp-bar{display:flex;align-items:center;gap:8px;background:var(--surface-1);border:1px solid var(--border2);border-radius:8px;padding:10px 12px}
.nlp-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12px;flex:1}
.nlp-input::placeholder{color:var(--text-dim)}
.nlp-btn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;background:var(--blue);color:#fff;border:none;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.nlp-chip{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--blue-lo);border:1px solid rgba(50,110,255,.2);color:var(--blue);cursor:pointer;white-space:nowrap}
.nlp-result{padding:12px 13px;background:rgba(50,110,255,0.04);border:1px solid rgba(50,110,255,0.15);border-radius:8px;font-size:12px;color:var(--text-mid);line-height:1.7;margin-top:10px}

/* ── DEFECT CARD ── */
.defect-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.defect-track{height:3px;background:var(--surface-2);border-radius:2px;margin-top:8px}
.defect-fill{height:100%;border-radius:2px;transition:width 1.5s}

/* ── QEG OVERVIEW CARDS ── */
.qeg-card{border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.qeg-card:hover{transform:translateY(-2px)}
.qeg-card.q{background:linear-gradient(140deg,rgba(50,110,255,0.1),rgba(50,110,255,0.04));border:1px solid rgba(50,110,255,.22)}
.qeg-card.e{background:linear-gradient(140deg,rgba(255,165,40,0.1),rgba(255,165,40,0.04));border:1px solid rgba(255,165,40,.22)}
.qeg-card.g{background:linear-gradient(140deg,rgba(50,200,110,0.1),rgba(50,200,110,0.04));border:1px solid rgba(50,200,110,.22)}
.qeg-score{font-family:var(--mono);font-size:42px;font-weight:700;line-height:1}

/* ── ADMIN ── */
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);border-bottom:1px solid var(--border)}
.admin-table td{padding:10px 12px;font-size:11px;border-bottom:1px solid var(--surface-2);color:var(--text-mid)}
.admin-table tr:hover td{background:var(--surface-1)}
.role-badge{font-size:9px;padding:2px 8px;border-radius:3px;font-weight:700;letter-spacing:.5px}
.status-active{background:var(--green-lo);color:var(--green);border:1px solid rgba(50,200,110,.2)}
.status-inactive{background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border)}
.action-btn{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:600;border:none;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-primary{background:var(--blue-lo);color:var(--blue);border:1px solid rgba(50,110,255,.25)}
.btn-primary:hover{background:rgba(50,110,255,.2)}
.btn-danger{background:var(--red-lo);color:var(--red);border:1px solid rgba(255,50,50,.25)}
.btn-danger:hover{background:rgba(255,50,50,.2)}
.btn-success{background:var(--green-lo);color:var(--green);border:1px solid rgba(50,200,110,.25)}
.btn-success:hover{background:rgba(50,200,110,.2)}
.config-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.config-label{font-size:11px;color:var(--text-mid);width:160px;flex-shrink:0}
.config-input{flex:1;background:var(--surface-2);border:1px solid var(--border2);border-radius:6px;padding:7px 11px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border-color .2s}
.config-input:focus{border-color:var(--blue)}
.config-input.masked{color:var(--text-dim);letter-spacing:2px}
.ds-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px}
.ds-status{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600}
.log-line{font-family:var(--mono);font-size:11px;padding:4px 0;border-bottom:1px solid var(--surface-1);color:var(--text-mid);line-height:1.5}
.log-line.err{color:var(--red)}.log-line.warn{color:var(--amber)}.log-line.ok{color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:480px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-body{padding:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.form-select{width:100%;background:var(--surface-2);border:1px solid var(--border2);border-radius:6px;padding:9px 11px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;cursor:pointer}
.form-select option{background:var(--bg3);color:var(--text)}

/* ── PROCESS IMAGE PANEL ── */
.process-img{width:100%;border-radius:8px;display:block;border:1px solid var(--border)}
.process-img-wrap{position:relative;cursor:zoom-in;overflow:hidden;border-radius:8px}
.process-img-wrap:hover .img-zoom-hint{opacity:1}
.img-zoom-hint{position:absolute;bottom:8px;right:8px;background:var(--overlay);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;opacity:0;transition:opacity .2s}

/* ── STRAND ── */
.strand-row{display:flex;gap:8px}
.strand-box{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px;text-align:center}
.strand-name{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.strand-val{font-family:var(--mono);font-size:16px;font-weight:700}

/* ── AI ASSISTANT PANEL ── */
.ai-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(180deg,rgba(80,40,255,0.18),rgba(120,60,255,0.22));border:1px solid rgba(160,80,255,0.35);border-right:none;border-radius:10px 0 0 10px;padding:14px 8px;cursor:pointer;transition:all .25s;backdrop-filter:blur(12px);box-shadow:-4px 0 24px rgba(120,60,255,0.18)}
.ai-tab:hover{background:linear-gradient(180deg,rgba(100,50,255,0.28),rgba(140,70,255,0.32));box-shadow:-6px 0 32px rgba(120,60,255,0.3)}
.ai-tab-label{writing-mode:vertical-rl;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--purple);text-transform:uppercase;opacity:.85}
.ai-tab-icon{font-size:16px;animation:ai-pulse 3s infinite}
@keyframes ai-pulse{0%,100%{filter:drop-shadow(0 0 4px rgba(160,80,255,0.6))}50%{filter:drop-shadow(0 0 10px rgba(160,80,255,0.9))}}
.ai-panel{position:fixed;right:0;top:0;bottom:0;width:380px;z-index:59;background:var(--ai-bg);border-left:1px solid rgba(160,80,255,0.2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(20px);box-shadow:-8px 0 48px var(--overlay)}
.ai-panel.open{transform:translateX(0)}
.ai-panel-header{padding:14px 16px 10px;border-bottom:1px solid rgba(160,80,255,0.15);flex-shrink:0;background:linear-gradient(180deg,rgba(120,60,255,0.08),transparent)}
.ai-panel-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.ai-panel-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.ai-panel-sub{font-size:10px;color:var(--text-dim);letter-spacing:.5px}
.ai-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:5px;transition:all .15s}
.ai-close:hover{color:var(--text);background:var(--surface-3)}
.ai-search-wrap{padding:10px 14px;border-bottom:1px solid rgba(160,80,255,0.1);flex-shrink:0}
.ai-search{display:flex;align-items:center;gap:8px;background:rgba(160,80,255,0.07);border:1px solid rgba(160,80,255,0.2);border-radius:8px;padding:8px 12px;transition:border-color .2s}
.ai-search:focus-within{border-color:rgba(160,80,255,0.45);box-shadow:0 0 0 3px rgba(160,80,255,0.08)}
.ai-search-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:11px;flex:1}
.ai-search-input::placeholder{color:var(--text-dim)}
.ai-ask-btn{padding:4px 11px;border-radius:5px;font-size:10px;font-weight:700;background:linear-gradient(135deg,var(--purple),oklch(60% 0.22 270deg));color:#fff;border:none;cursor:pointer;font-family:var(--sans);white-space:nowrap;transition:opacity .2s}
.ai-ask-btn:hover{opacity:.85}
.ai-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0}
.ai-section-head{display:flex;align-items:center;gap:8px;padding:10px 14px 6px;position:sticky;top:0;background:var(--ai-bg-sticky);z-index:1;backdrop-filter:blur(8px)}
.ai-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);flex:1}
.ai-section-count{font-family:var(--mono);font-size:9px;color:var(--text-dim);background:var(--surface-2);padding:1px 6px;border-radius:3px}
.ai-module-group{margin-bottom:2px}
.ai-module-head{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.ai-module-head:hover{background:var(--surface-1)}
.ai-module-head.active-group{border-left-color:var(--purple);background:rgba(160,80,255,0.05)}
.ai-module-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.ai-module-label{font-size:11px;font-weight:600;flex:1;color:var(--text-mid)}
.ai-module-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.5px}
.ai-mod-chevron{font-size:9px;color:var(--text-dim);transition:transform .2s;opacity:.5}
.ai-mod-chevron.open{transform:rotate(90deg)}
.ai-sub-list{overflow:hidden;max-height:0;transition:max-height .22s ease}
.ai-sub-list.open{max-height:400px}
.ai-sub-item{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 47px;cursor:pointer;transition:all .12s;border-left:2px solid transparent}
.ai-sub-item:hover{background:var(--surface-1);color:var(--text)}
.ai-sub-item.active{border-left-color:var(--purple);background:rgba(160,80,255,0.07);color:var(--purple)}
.ai-sub-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.7}
.ai-sub-label{font-size:11px;flex:1}
.ai-sub-tag{font-size:8px;font-weight:600;padding:1px 5px;border-radius:2px;white-space:nowrap}
.ai-result-box{margin:10px 14px;background:rgba(160,80,255,0.05);border:1px solid rgba(160,80,255,0.18);border-radius:8px;padding:12px}
.ai-result-hd{font-size:10px;font-weight:700;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ai-result-body{font-size:11px;color:var(--text-mid);line-height:1.7}
.ai-thinking{display:flex;gap:4px;align-items:center;padding:8px 0}
.ai-thinking-dot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:ai-think 1.2s infinite}
.ai-insight-card{margin:0 14px 6px;background:var(--surface-1);border:1px solid var(--surface-3);border-radius:7px;padding:10px 12px;cursor:pointer;transition:all .15s}
.ai-insight-card:hover{background:var(--surface-2);border-color:rgba(160,80,255,0.2)}
.ai-insight-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.ai-insight-title{font-size:11px;font-weight:600}
.ai-insight-desc{font-size:10px;color:var(--text-dim);line-height:1.5}
.ai-insight-sev{width:6px;height:6px;border-radius:50%;flex-shrink:0}
@keyframes ai-think{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-4px);opacity:1}}
@media(max-width:700px){.ai-panel{width:100vw}.ai-tab{display:none}}

/* ── MICROAPP IDENTITY BAR ── */
.microapp-bar{display:flex;align-items:center;gap:14px;padding:9px 20px;background:linear-gradient(90deg,rgba(80,130,255,0.06),rgba(80,130,255,0.02) 60%,transparent);border-bottom:1px solid var(--border);flex-shrink:0}
.ma-id{display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:0}
.ma-mark{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;border:1px solid currentColor;border-color:rgba(255,255,255,0.1)}
.ma-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ma-ver{font-family:var(--mono);font-size:10px;color:var(--text-dim);font-weight:500;padding:1px 5px;border-radius:3px;background:var(--surface-2);border:1px solid var(--border)}
.ma-vendor{font-size:10px;color:var(--text-dim);letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ma-bindings{display:flex;align-items:center;gap:6px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}
.ma-chip{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9.5px;font-weight:600;padding:3px 9px;border-radius:11px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-mid);white-space:nowrap}
.ma-chip.iba{background:rgba(50,110,255,0.08);border-color:rgba(50,110,255,0.22);color:var(--blue)}
.ma-chip.l2{background:rgba(160,80,255,0.08);border-color:rgba(160,80,255,0.22);color:var(--purple)}
.ma-chip.health{background:rgba(50,200,110,0.08);border-color:rgba(50,200,110,0.22);color:var(--green)}
.ma-chip.beta{background:rgba(255,165,40,0.08);border-color:rgba(255,165,40,0.22);color:var(--amber)}
.ma-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pgn 2s infinite}
.ma-actions{display:flex;gap:5px}
.ma-iconbtn{width:24px;height:24px;border-radius:5px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ma-iconbtn:hover{background:var(--surface-3);color:var(--text)}

/* ── MODULE REGISTRY ── */
.reg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.reg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0;overflow:hidden;display:flex;flex-direction:column;transition:all .2s}
.reg-card:hover{border-color:var(--border2)}
.reg-card.dev{opacity:.78;background:repeating-linear-gradient(45deg,var(--bg2) 0,var(--bg2) 14px,rgba(255,255,255,0.015) 14px,rgba(255,255,255,0.015) 28px)}
.reg-card-head{padding:14px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--border)}
.reg-mark{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;border:1px solid currentColor}
.reg-info{flex:1;min-width:0}
.reg-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.reg-tagline{font-size:11px;color:var(--text-dim);margin-top:3px;line-height:1.4}
.reg-meta-row{font-family:var(--mono);font-size:9.5px;color:var(--text-dim);margin-top:5px;letter-spacing:.2px}
.reg-status-tag{font-size:8.5px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px}
.reg-status-tag.active{background:rgba(50,200,110,0.14);color:var(--green);border:1px solid rgba(50,200,110,.3)}
.reg-status-tag.beta{background:rgba(255,165,40,0.14);color:var(--amber);border:1px solid rgba(255,165,40,.3)}
.reg-status-tag.dev{background:rgba(160,80,255,0.14);color:var(--purple);border:1px solid rgba(160,80,255,.3)}
.reg-status-tag.disabled{background:rgba(140,160,200,0.1);color:var(--text-dim);border:1px solid var(--border)}
.reg-card-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px;flex:1}
.reg-spec-row{display:flex;justify-content:space-between;align-items:center;font-size:11px}
.reg-spec-label{color:var(--text-dim)}
.reg-spec-val{font-family:var(--mono);color:var(--text-mid);font-size:10.5px}
.reg-bindings{display:flex;flex-wrap:wrap;gap:4px}
.reg-binding{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;background:var(--surface-1);border:1px solid var(--border);color:var(--text-dim)}
.reg-binding.iba{color:var(--blue);border-color:rgba(50,110,255,0.25);background:rgba(50,110,255,0.06)}
.reg-binding.l2{color:var(--purple);border-color:rgba(160,80,255,0.25);background:rgba(160,80,255,0.06)}
.reg-health-bar{height:5px;background:var(--surface-2);border-radius:3px;overflow:hidden;margin-top:4px}
.reg-health-fill{height:100%;border-radius:3px;transition:width .8s ease}
.reg-card-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px;background:var(--surface-2)}
.reg-card-foot .action-btn{flex:1;text-align:center;padding:6px 8px;font-size:10px}
.reg-add-card{background:transparent;border:2px dashed rgba(160,80,255,0.3);border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;cursor:pointer;min-height:180px;transition:all .2s;color:var(--purple)}
.reg-add-card:hover{background:rgba(160,80,255,0.05);border-color:rgba(160,80,255,0.5)}
.reg-add-icon{width:48px;height:48px;border-radius:12px;background:var(--purple-lo);border:1px solid rgba(160,80,255,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700}

/* ── WIZARD ── */
.wiz-overlay{position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.wiz-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:640px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 32px 80px var(--overlay)}
.wiz-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.wiz-title{font-size:15px;font-weight:700}
.wiz-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
.wiz-steps{display:flex;padding:14px 22px 0;gap:6px;flex-shrink:0}
.wiz-step{flex:1;display:flex;flex-direction:column;gap:4px}
.wiz-step-bar{height:3px;border-radius:2px;background:var(--surface-3);transition:background .2s}
.wiz-step.done .wiz-step-bar{background:var(--green)}
.wiz-step.active .wiz-step-bar{background:var(--purple)}
.wiz-step-label{font-size:9px;color:var(--text-dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.wiz-step.active .wiz-step-label{color:var(--purple)}
.wiz-step.done .wiz-step-label{color:var(--green)}
.wiz-body{padding:20px 22px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.wiz-row{display:flex;flex-direction:column;gap:5px}
.wiz-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wiz-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;flex-shrink:0;background:var(--surface-2)}
.wiz-pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;max-height:200px;overflow-y:auto;padding:4px;background:var(--surface-3);border:1px solid var(--border);border-radius:8px}
.wiz-pick{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:5px;background:var(--surface-1);border:1px solid var(--border);cursor:pointer;font-size:10.5px;transition:all .15s}
.wiz-pick:hover{background:var(--surface-2)}
.wiz-pick.sel{background:var(--purple-lo);border-color:rgba(160,80,255,0.4);color:var(--purple)}
.wiz-pick input{margin:0}
.wiz-icon-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.wiz-icon-pick{aspect-ratio:1;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s}
.wiz-icon-pick.sel{background:var(--purple-lo);border-color:rgba(160,80,255,0.45);color:var(--purple)}
.wiz-color-grid{display:flex;gap:6px}
.wiz-color-pick{width:34px;height:34px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.wiz-color-pick.sel{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,0.12)}

/* ── ARCHITECTURE DIAGRAM ── */
.arch-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 14px}
.arch-svg-wrap{width:100%;overflow-x:auto}
.arch-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.arch-legend-item{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--text-mid)}
.arch-swatch{width:12px;height:12px;border-radius:3px;border:1px solid currentColor}

/* ── DATA BUS / CHANNEL TABLE ── */
.bus-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;background:rgba(255,255,255,0.015);border:1px solid var(--border);margin-bottom:5px}
.bus-tag{font-family:var(--mono);font-size:10.5px;font-weight:600;width:170px;flex-shrink:0}
.bus-desc{font-size:11px;color:var(--text-mid);flex:1;min-width:0}
.bus-meta{font-family:var(--mono);font-size:10px;color:var(--text-dim);white-space:nowrap}
.bus-target{display:flex;gap:3px;flex-wrap:wrap}
.bus-target .bus-tag-pill{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700}
.conn-toggle{display:flex;background:var(--surface-2);border-radius:6px;padding:2px;gap:0}
.conn-toggle button{flex:1;padding:5px 10px;font-size:10px;background:none;border:none;color:var(--text-dim);cursor:pointer;border-radius:5px;font-family:var(--sans);font-weight:600;transition:all .15s}
.conn-toggle button.on{background:var(--blue-lo);color:var(--blue);box-shadow:0 0 0 1px rgba(50,110,255,0.2) inset}

/* ── PERSONA CARD ── */
.persona-strip{display:flex;align-items:center;gap:10px;padding:7px 12px;background:linear-gradient(90deg,rgba(160,80,255,0.06),transparent 80%);border:1px solid rgba(160,80,255,0.15);border-radius:8px;margin-bottom:10px}
.persona-icon{width:28px;height:28px;border-radius:6px;background:rgba(160,80,255,0.1);border:1px solid rgba(160,80,255,0.25);display:flex;align-items:center;justify-content:center;color:var(--purple);font-size:13px}
.persona-intent{font-size:10px;color:var(--text-dim)}

/* ══════════════════════════════════════════════
   MARKETING / LANDING PAGE STYLES
══════════════════════════════════════════════ */
.lp-page{position:fixed;inset:0;overflow-y:auto;overflow-x:hidden;background:var(--bg);color:var(--text);z-index:1;font-family:var(--sans);scroll-behavior:smooth}
.lp-page *{box-sizing:border-box}

/* Top nav */
.lp-nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,0.78);backdrop-filter:saturate(160%) blur(20px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center}
.lp-nav-inner{max-width:1280px;width:100%;margin:0 auto;display:flex;align-items:center;gap:24px;padding:0 32px}
.lp-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer}
.lp-logo-mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(140deg,oklch(60% 0.22 248deg),oklch(48% 0.24 268deg));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;box-shadow:0 4px 14px rgba(50,110,255,0.25);letter-spacing:-.5px}
.lp-logo-text{font-size:19px;font-weight:700;letter-spacing:-.4px;line-height:1.05}
.lp-logo-text em{color:var(--blue);font-style:normal}
.lp-logo-sub{font-size:9px;color:var(--text-dim);letter-spacing:1.8px;text-transform:uppercase;margin-top:1px;font-weight:600}
.lp-nav-links{display:flex;gap:28px;flex:1;justify-content:center}
.lp-nav-link{font-size:13px;font-weight:500;color:var(--text-mid);cursor:pointer;transition:color .15s;background:none;border:none;font-family:var(--sans);padding:0}
.lp-nav-link:hover{color:var(--text)}
.lp-nav-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.lp-nav-secondary{font-size:13px;color:var(--text-mid);font-weight:500;cursor:pointer;background:none;border:none;font-family:var(--sans)}
.lp-nav-secondary:hover{color:var(--text)}

.lp-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:transform .15s, box-shadow .15s;white-space:nowrap}
.lp-btn-primary{background:linear-gradient(135deg,oklch(58% 0.22 250deg),oklch(46% 0.24 270deg));color:#fff;box-shadow:0 4px 14px rgba(50,110,255,0.28)}
.lp-btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(50,110,255,0.38)}
.lp-btn-ghost{background:var(--bg2);border:1px solid var(--border2);color:var(--text)}
.lp-btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.lp-btn-lg{padding:14px 24px;font-size:14px}

/* Sections */
.lp-section{padding:96px 32px;position:relative}
.lp-section-inner{max-width:1280px;margin:0 auto}
.lp-section-alt{background:linear-gradient(180deg,var(--bg4),var(--bg))}
.lp-section-dark{background:#070b14;color:#e8edf8}
.lp-section-dark .lp-eyebrow{color:#7aa0ff}
.lp-section-dark .lp-lead{color:#a0aac4}
.lp-section-dark .lp-h2{color:#fff}
.lp-eyebrow{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--blue);margin-bottom:16px}
.lp-h1{font-size:clamp(38px,5.5vw,64px);font-weight:700;line-height:1.04;letter-spacing:-1.6px;margin:0 0 22px}
.lp-h1 em{font-style:normal;background:linear-gradient(135deg,oklch(58% 0.24 250deg),oklch(58% 0.26 290deg));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.lp-h2{font-size:clamp(28px,3.5vw,42px);font-weight:700;line-height:1.1;letter-spacing:-.8px;margin:0 0 14px}
.lp-h3{font-size:19px;font-weight:700;line-height:1.3;margin:0 0 10px}
.lp-lead{font-size:17px;color:var(--text-mid);line-height:1.6;max-width:620px;margin:0 0 32px}
.lp-section-head{text-align:center;max-width:720px;margin:0 auto 56px}
.lp-section-head .lp-lead{margin-left:auto;margin-right:auto}

/* Hero */
.lp-hero{padding:80px 32px 90px;position:relative;overflow:hidden;background:radial-gradient(ellipse at 80% 30%, rgba(50,110,255,0.09), transparent 55%),radial-gradient(ellipse at 0% 100%, rgba(160,80,255,0.05), transparent 50%)}
.lp-hero-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:center;max-width:1280px;margin:0 auto}
.lp-hero-cta{display:flex;gap:12px;flex-wrap:wrap}
.lp-hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:40px;padding-top:28px;border-top:1px solid var(--border)}
.lp-stat-val{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--blue);line-height:1;letter-spacing:-.5px}
.lp-stat-label{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.2px;margin-top:6px;font-weight:600;line-height:1.4}

/* Industry strip */
.lp-trust{padding:36px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.lp-trust-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.lp-trust-label{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase}
.lp-trust-item{font-size:12.5px;color:var(--text-mid);font-weight:600;letter-spacing:.3px;padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:var(--bg)}

/* Capabilities grid */
.lp-cap-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.lp-cap-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:26px;transition:transform .2s, box-shadow .2s, border-color .2s;box-shadow:var(--card-shadow)}
.lp-cap-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(20,40,100,0.08);border-color:var(--border2)}
.lp-cap-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:18px;font-weight:800;border:1px solid currentColor}
.lp-cap-desc{font-size:13px;color:var(--text-mid);line-height:1.6}

/* How it works */
.lp-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-items:stretch;position:relative;margin-top:20px}
.lp-flow-step{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 18px 20px;position:relative;display:flex;flex-direction:column;gap:8px;box-shadow:var(--card-shadow)}
.lp-flow-num{position:absolute;top:-12px;left:18px;width:26px;height:26px;border-radius:7px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;box-shadow:0 4px 12px rgba(50,110,255,0.3)}
.lp-flow-icon{font-size:24px;margin:6px 0 4px;line-height:1}
.lp-flow-title{font-size:14px;font-weight:700}
.lp-flow-desc{font-size:11.5px;color:var(--text-dim);line-height:1.55}

/* AI section */
.lp-ai-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:center}
.lp-ai-demo{background:linear-gradient(180deg,#0b1120,#0f1726);border-radius:14px;padding:24px;color:#e8edf8;font-family:var(--mono);font-size:12.5px;line-height:1.7;box-shadow:0 24px 60px rgba(20,40,100,0.18);position:relative;overflow:hidden;border:1px solid #1d2a44}
.lp-ai-demo::before{content:'';position:absolute;top:-40%;right:-40%;width:80%;height:80%;background:radial-gradient(circle,rgba(160,80,255,0.18),transparent 60%);pointer-events:none}
.lp-ai-prompt-line{color:#7aa0ff;display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:600;position:relative}
.lp-ai-prompt-line .lp-ai-icon{color:#a060ff;font-size:14px}
.lp-ai-response{color:#a0aac4;margin-bottom:14px;position:relative}
.lp-ai-response strong{color:#fff;font-weight:600}
.lp-ai-response .hl-amber{color:#ffd166}
.lp-ai-response .hl-red{color:#ff7d8a}
.lp-ai-response .hl-green{color:#6dd58c}
.lp-ai-tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:3px;background:rgba(160,80,255,0.18);color:#c599ff;letter-spacing:1px;margin-left:6px;font-weight:700}
.lp-ai-cursor{display:inline-block;width:7px;height:14px;background:#a060ff;margin-left:2px;vertical-align:middle;animation:lp-blink 1s infinite}
@keyframes lp-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.lp-ai-features{display:flex;flex-direction:column;gap:18px}
.lp-ai-feat{display:flex;gap:14px;align-items:flex-start}
.lp-ai-feat-icon{width:40px;height:40px;border-radius:9px;background:var(--purple-lo);border:1px solid rgba(160,80,255,0.25);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:var(--purple);font-weight:800}

/* Microapps catalog */
.lp-mod-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
.lp-mod-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;position:relative;overflow:hidden;transition:transform .2s, box-shadow .2s;box-shadow:var(--card-shadow);min-height:220px;display:flex;flex-direction:column}
.lp-mod-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(20,40,100,0.1)}
.lp-mod-card.special{background:linear-gradient(140deg,var(--purple-lo),var(--bg2));border-color:rgba(160,80,255,0.3);border-style:dashed}
.lp-mod-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin-bottom:16px;border:1px solid currentColor}
.lp-mod-features{margin-top:auto;display:flex;flex-direction:column;gap:5px;padding-top:14px;border-top:1px solid var(--border)}
.lp-mod-feat{font-size:11.5px;color:var(--text-mid);display:flex;align-items:center;gap:8px}
.lp-mod-feat::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.6;flex-shrink:0}

/* Integrations */
.lp-int-cats{display:flex;flex-direction:column;gap:28px}
.lp-int-cat-label{font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.lp-int-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
.lp-int-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 14px;transition:transform .15s, border-color .15s, box-shadow .15s;display:flex;flex-direction:column;gap:5px}
.lp-int-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(20,40,100,0.06)}
.lp-int-name{font-size:13px;font-weight:700}
.lp-int-type{font-size:10px;color:var(--text-dim);letter-spacing:.5px}

/* Cloud section */
.lp-cloud-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:center}
.lp-cloud-points{display:flex;flex-direction:column;gap:18px}
.lp-cloud-point{display:flex;gap:14px;align-items:flex-start}
.lp-cloud-pt-icon{width:36px;height:36px;border-radius:9px;background:rgba(80,150,255,0.12);border:1px solid rgba(80,150,255,0.25);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#7aa0ff;font-weight:800}
.lp-cloud-pt-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.lp-cloud-pt-desc{font-size:12.5px;color:#a0aac4;line-height:1.6}
.lp-cloud-card{background:linear-gradient(180deg,#0e1626,#0a111e);border-radius:16px;padding:36px;border:1px solid #1a2540}

/* Trial */
.lp-trial-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:stretch}
.lp-trial-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;display:flex;flex-direction:column;box-shadow:var(--card-shadow);position:relative;transition:transform .2s}
.lp-trial-card.featured{border:2px solid var(--blue);box-shadow:0 16px 48px rgba(50,110,255,0.15);transform:scale(1.02)}
.lp-trial-card:hover{transform:translateY(-3px)}
.lp-trial-card.featured:hover{transform:scale(1.02) translateY(-3px)}
.lp-trial-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:9.5px;font-weight:700;letter-spacing:1.5px;padding:4px 12px;border-radius:4px}
.lp-trial-name{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.8px;text-transform:uppercase}
.lp-trial-price{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--text);line-height:1.1;margin:14px 0 6px}
.lp-trial-cycle{font-size:12px;color:var(--text-dim);margin-bottom:20px}
.lp-trial-features{flex:1;display:flex;flex-direction:column;gap:9px;margin-bottom:20px;padding-top:18px;border-top:1px solid var(--border)}
.lp-trial-feat{font-size:12.5px;color:var(--text-mid);display:flex;align-items:flex-start;gap:9px;line-height:1.5}
.lp-trial-feat::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;font-size:12px;margin-top:1px}

/* Contact */
.lp-contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:48px;align-items:start}
.lp-contact-info{display:flex;flex-direction:column;gap:22px}
.lp-contact-item{display:flex;gap:14px;align-items:flex-start}
.lp-contact-icon{width:38px;height:38px;border-radius:9px;background:var(--blue-lo);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:var(--blue)}
.lp-contact-item-label{font-size:10.5px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.lp-contact-item-val{font-size:14px;color:var(--text);margin-top:3px;font-weight:500}
.lp-form{display:grid;grid-template-columns:1fr 1fr;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--card-shadow)}
.lp-form-row{display:flex;flex-direction:column;gap:5px}
.lp-form-row.full{grid-column:span 2}
.lp-input,.lp-textarea,.lp-select{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s, box-shadow .15s}
.lp-input:focus,.lp-textarea:focus,.lp-select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,110,255,0.12)}
.lp-textarea{min-height:110px;resize:vertical;font-family:var(--sans)}
.lp-label{font-size:11px;font-weight:600;color:var(--text-mid);letter-spacing:.3px}
.lp-form-success{grid-column:span 2;padding:32px 20px;border:1px solid rgba(50,200,110,0.3);background:var(--green-lo);border-radius:10px;color:var(--green);font-size:14px;font-weight:600;text-align:center;line-height:1.6}

/* Footer */
.lp-footer{background:#0a0f1c;color:#a0aac4;padding:56px 32px 28px;border-top:1px solid #1a2540}
.lp-footer-grid{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:36px}
.lp-footer-tagline{font-size:13px;color:#a0aac4;margin-top:16px;line-height:1.6;max-width:280px}
.lp-foot-h{font-size:11.5px;font-weight:700;color:#fff;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
.lp-foot-link{display:block;font-size:13px;color:#a0aac4;margin-bottom:9px;text-decoration:none;cursor:pointer;transition:color .15s;background:none;border:none;padding:0;font-family:var(--sans);text-align:left}
.lp-foot-link:hover{color:#fff}
.lp-footer-bottom{max-width:1280px;margin:0 auto;padding-top:24px;border-top:1px solid #1a2540;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#5e6a85;flex-wrap:wrap;gap:14px}
.lp-foot-bottom-links{display:flex;gap:20px}

/* Responsive */
@media(max-width:1100px){
  .lp-flow{grid-template-columns:repeat(3,1fr);row-gap:24px}
  .lp-cap-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .lp-nav-links{display:none}
  .lp-hero-grid,.lp-ai-grid,.lp-cloud-grid,.lp-contact-grid{grid-template-columns:1fr;gap:40px}
  .lp-trial-grid{grid-template-columns:1fr}
  .lp-trial-card.featured{transform:none}
  .lp-trial-card.featured:hover{transform:translateY(-3px)}
  .lp-flow{grid-template-columns:1fr;row-gap:24px}
  .lp-cap-grid{grid-template-columns:1fr}
  .lp-section{padding:64px 22px}
  .lp-hero{padding:48px 22px 64px}
  .lp-hero-stats{grid-template-columns:repeat(2,1fr);gap:20px}
  .lp-form{grid-template-columns:1fr}
  .lp-form-row.full{grid-column:span 1}
  .lp-footer-grid{grid-template-columns:1fr 1fr;gap:32px}
  .lp-nav-inner{padding:0 18px}
  .lp-section-inner{padding:0}
}

/* Process Coverage */
.lp-proc-svg-wrap{width:100%;overflow-x:auto;padding:8px 0;background:linear-gradient(180deg,transparent,var(--bg4) 100%);border-radius:14px}
.lp-proc-note{display:flex;align-items:flex-start;gap:14px;margin-top:32px;padding:18px 22px;background:var(--purple-lo);border:1px dashed rgba(160,80,255,0.35);border-radius:12px}
.lp-proc-note-icon{width:36px;height:36px;border-radius:9px;background:rgba(160,80,255,0.18);border:1px solid rgba(160,80,255,0.4);display:flex;align-items:center;justify-content:center;color:var(--purple);font-size:18px;font-weight:800;flex-shrink:0}
.lp-proc-note-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.lp-proc-note-desc{font-size:12.5px;color:var(--text-mid);line-height:1.6}

/* Outcomes */
.lp-out-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.lp-out-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;box-shadow:var(--card-shadow);transition:transform .2s, box-shadow .2s, border-color .2s;display:flex;flex-direction:column}
.lp-out-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(20,40,100,0.08);border-color:var(--border2)}
.lp-out-icon{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-weight:800;border:1px solid currentColor}
.lp-out-metric{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1;letter-spacing:-.5px;margin-bottom:6px}
.lp-out-unit{font-size:13px;color:var(--text-dim);margin-left:4px;font-family:var(--mono)}
.lp-out-desc{font-size:13px;color:var(--text-mid);line-height:1.6;margin-top:8px}

/* Lifecycle */
.lp-life-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:stretch}
.lp-life-step{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px 18px 22px;position:relative;box-shadow:var(--card-shadow);display:flex;flex-direction:column;gap:8px}
.lp-life-step::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--life-c);border-radius:12px 12px 0 0}
.lp-life-num{width:30px;height:30px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:6px}
.lp-life-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.25}
.lp-life-desc{font-size:12px;color:var(--text-dim);line-height:1.55}
.lp-life-arrow{position:absolute;right:-18px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:700;z-index:1;background:var(--bg);width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}

/* How-it-works animated icon container (replaces lp-flow-icon) */
.lp-flow-anim{margin:6px 0 4px;display:flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:14px;border:1px solid var(--border);background:var(--bg)}
.lp-flow-num{background:var(--blue)}
.lp-flow-step{padding-top:24px}

/* Responsive overrides for new sections */
@media(max-width:1100px){
  .lp-life-flow{grid-template-columns:repeat(2,1fr);row-gap:32px}
  .lp-life-arrow{display:none}
  .lp-out-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .lp-life-flow{grid-template-columns:1fr}
  .lp-out-grid{grid-template-columns:1fr}
  .lp-proc-note{flex-direction:column;gap:10px}
}

/* ══════════════════════════════════════════════
   MARKETING — VISUAL POLISH PASS
   Editorial serif italic, richer hero, premium
   CTAs, dramatic shadows, vibrant accents
══════════════════════════════════════════════ */
.lp-page{
  --display:'Instrument Serif',Georgia,serif;
  --hot:#ff6a2d;
  --hot-2:#ff9249;
  --grad-primary:linear-gradient(135deg,oklch(56% 0.24 252deg) 0%,oklch(50% 0.27 280deg) 50%,oklch(58% 0.26 320deg) 100%);
  --grad-hero-blob1:radial-gradient(ellipse 70% 50% at 78% 26%, rgba(50,110,255,0.18), transparent 60%);
  --grad-hero-blob2:radial-gradient(ellipse 55% 45% at 8% 88%, rgba(160,80,255,0.13), transparent 60%);
  --grad-hero-blob3:radial-gradient(ellipse 60% 50% at 100% 100%, rgba(255,110,40,0.1), transparent 55%);
  --shadow-soft:0 1px 2px rgba(20,40,100,0.04), 0 8px 24px rgba(20,40,100,0.06);
  --shadow-hover:0 20px 50px rgba(20,40,100,0.12), 0 4px 12px rgba(20,40,100,0.06);
  --shadow-cta:0 8px 24px rgba(50,110,255,0.32), inset 0 1px 0 rgba(255,255,255,0.2);
  --shadow-cta-hover:0 16px 44px rgba(50,110,255,0.45), inset 0 1px 0 rgba(255,255,255,0.28);
  scroll-behavior:smooth;
}

/* === Eyebrow with accent bar === */
.lp-page .lp-eyebrow{display:inline-flex;align-items:center;gap:11px;padding:6px 12px 6px 6px;background:var(--blue-lo);border:1px solid var(--border2);border-radius:999px;color:var(--blue);font-size:10.5px;font-weight:700;letter-spacing:2px;margin-bottom:18px}
.lp-page .lp-eyebrow::before{content:'';width:18px;height:6px;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--hot));flex-shrink:0}

/* === Headlines with serif italic emphasis === */
.lp-page .lp-h1{font-size:clamp(40px,6.2vw,76px);font-weight:600;line-height:1;letter-spacing:-2.2px}
.lp-page .lp-h1 em{font-family:var(--display);font-style:italic;font-weight:400;letter-spacing:-1.5px;background:linear-gradient(135deg,oklch(58% 0.24 250deg) 0%,oklch(58% 0.26 290deg) 50%,oklch(62% 0.22 30deg) 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;padding-right:.05em}
.lp-page .lp-h2{font-size:clamp(30px,3.8vw,46px);font-weight:600;letter-spacing:-1.1px;line-height:1.08}
.lp-page .lp-h2 em{font-family:var(--display);font-style:italic;font-weight:400;color:var(--blue);letter-spacing:-.6px}
.lp-page .lp-lead{font-size:17.5px;line-height:1.65;color:var(--text-mid);max-width:640px}
.lp-page .lp-lead strong{color:var(--text);font-weight:600}

/* === Premium gradient CTAs === */
.lp-page .lp-btn-primary{
  background:var(--grad-primary);
  background-size:200% 200%;
  background-position:0% 50%;
  box-shadow:var(--shadow-cta);
  transition:transform .2s, box-shadow .25s, background-position .4s ease;
  position:relative;
}
.lp-page .lp-btn-primary:hover{transform:translateY(-2px);box-shadow:var(--shadow-cta-hover);background-position:100% 50%}
.lp-page .lp-btn-ghost{background:var(--bg2);border:1px solid var(--border2);box-shadow:var(--shadow-soft);transition:all .2s}
.lp-page .lp-btn-ghost:hover{border-color:var(--blue);color:var(--blue);box-shadow:0 8px 24px rgba(50,110,255,0.12);transform:translateY(-2px)}
.lp-page .lp-btn-lg{padding:15px 26px;font-size:14.5px;letter-spacing:.2px}

/* === HERO — animated dot grid + gradient blobs === */
.lp-page .lp-hero{
  padding:100px 32px 110px;
  position:relative;
  background:var(--grad-hero-blob1),var(--grad-hero-blob2),var(--grad-hero-blob3),linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
  overflow:hidden;
}
.lp-page .lp-hero::before{
  content:'';
  position:absolute;
  inset:-2px;
  background-image:radial-gradient(circle,rgba(20,40,100,0.12) 1.2px,transparent 1.2px);
  background-size:28px 28px;
  -webkit-mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000,transparent 75%);
  mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,#000,transparent 75%);
  opacity:.7;
  pointer-events:none;
  z-index:0;
}
.lp-page .lp-hero::after{
  content:'';
  position:absolute;
  top:-200px;
  right:-220px;
  width:580px;
  height:580px;
  border-radius:50%;
  background:conic-gradient(from 220deg,rgba(50,110,255,0.18),rgba(160,80,255,0.12),rgba(255,110,40,0.12),rgba(50,110,255,0.18));
  filter:blur(80px);
  opacity:.7;
  pointer-events:none;
  z-index:0;
  animation:lp-spin 24s linear infinite;
}
@keyframes lp-spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.lp-page .lp-hero > *{position:relative;z-index:1}

/* === HERO STATS — bigger + impact === */
.lp-page .lp-stat-val{font-size:34px;font-weight:700;letter-spacing:-1px;background:linear-gradient(180deg,var(--text) 0%,var(--blue) 110%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.lp-page .lp-stat-label{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:1.4px}

/* === Nav refinement === */
.lp-nav{height:68px;background:rgba(255,255,255,0.72)}
.lp-page .lp-nav-link{position:relative}
.lp-page .lp-nav-link::after{content:'';position:absolute;left:0;right:0;bottom:-22px;height:2px;background:var(--blue);transform:scaleX(0);transition:transform .2s;border-radius:1px}
.lp-page .lp-nav-link:hover::after{transform:scaleX(1)}

/* === Section rhythm === */
.lp-page .lp-section{padding:108px 32px}
.lp-page .lp-section-alt{background:linear-gradient(180deg,#f8f9fd 0%,var(--bg) 100%);position:relative}
.lp-page .lp-section-alt::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.lp-page .lp-section-head{margin-bottom:64px}

/* === Card system === */
.lp-page .lp-cap-card,
.lp-page .lp-out-card,
.lp-page .lp-mod-card,
.lp-page .lp-trial-card,
.lp-page .lp-life-step,
.lp-page .lp-int-card,
.lp-page .lp-flow-step{box-shadow:var(--shadow-soft);transition:transform .25s, box-shadow .25s, border-color .25s}
.lp-page .lp-cap-card:hover,
.lp-page .lp-out-card:hover,
.lp-page .lp-mod-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-hover)}
.lp-page .lp-cap-icon,
.lp-page .lp-out-icon,
.lp-page .lp-mod-icon{box-shadow:0 4px 16px rgba(20,40,100,0.06), inset 0 1px 0 rgba(255,255,255,0.6)}

/* === Outcomes — make the metric POP === */
.lp-page .lp-out-metric{font-family:var(--display);font-weight:400;font-style:italic;font-size:48px;line-height:1;letter-spacing:-1.5px}
.lp-page .lp-out-metric > span:first-child{font-family:var(--mono);font-style:normal;font-weight:700;letter-spacing:-1px}
.lp-page .lp-out-card{position:relative;overflow:hidden}
.lp-page .lp-out-card::after{content:'';position:absolute;right:-40px;bottom:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--out-glow,rgba(50,110,255,0.07)),transparent 70%);pointer-events:none}

/* === Microapps card emphasis === */
.lp-page .lp-mod-card{position:relative;overflow:hidden}
.lp-page .lp-mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--mod-c,var(--blue));opacity:.8}
.lp-page .lp-mod-card.special::before{background:linear-gradient(90deg,var(--purple),var(--hot))}

/* === Trial card — featured emphasis === */
.lp-page .lp-trial-card.featured{
  background:linear-gradient(180deg,#fff,#fafbff);
  border:1px solid transparent;
  background-clip:padding-box;
  box-shadow:0 24px 64px rgba(50,110,255,0.18), 0 0 0 2px var(--blue), inset 0 1px 0 #fff;
}
.lp-page .lp-trial-price{font-family:var(--display);font-style:italic;font-weight:400;font-size:42px;letter-spacing:-1px;line-height:1}
.lp-page .lp-trial-name{color:var(--blue)}

/* === Process Coverage — softer card === */
.lp-page .lp-proc-svg-wrap{background:linear-gradient(180deg,#fff 0%,#f4f7fc 100%);border:1px solid var(--border);box-shadow:var(--shadow-soft);padding:24px 8px}

/* === Lifecycle — better card === */
.lp-page .lp-life-step{padding-top:30px}
.lp-page .lp-life-num{box-shadow:0 6px 16px var(--life-c-shadow,rgba(50,110,255,0.3)), inset 0 1px 0 rgba(255,255,255,0.3)}

/* === Trust strip — richer === */
.lp-trust{background:linear-gradient(180deg,#fafbfd,#fff);padding:44px 32px}
.lp-page .lp-trust-item{background:var(--bg);border:1px solid var(--border);padding:8px 16px;transition:all .2s;font-size:12.5px}
.lp-page .lp-trust-item:hover{border-color:var(--blue);color:var(--blue);transform:translateY(-1px)}

/* === AI demo polish === */
.lp-page .lp-ai-demo{box-shadow:0 32px 80px rgba(20,40,100,0.2), 0 0 0 1px rgba(160,80,255,0.15), inset 0 1px 0 rgba(255,255,255,0.05)}

/* === How-it-works animated icon === */
.lp-page .lp-flow-anim{box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,0.6)}
.lp-page .lp-flow-step:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}

/* === Cloud section punch === */
.lp-page .lp-section-dark{background:radial-gradient(ellipse at top right, #1a2540 0%, #070b14 60%);position:relative;overflow:hidden}
.lp-page .lp-section-dark::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,#000,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 60% 60% at 50% 50%,#000,transparent 80%);pointer-events:none}
.lp-page .lp-section-dark > *{position:relative;z-index:1}
.lp-page .lp-section-dark .lp-eyebrow{background:rgba(122,160,255,0.1);border-color:rgba(122,160,255,0.25);color:#7aa0ff}
.lp-page .lp-section-dark .lp-eyebrow::before{background:linear-gradient(90deg,#7aa0ff,var(--hot))}

/* === Contact form polish === */
.lp-page .lp-form{box-shadow:0 16px 48px rgba(20,40,100,0.1), 0 0 0 1px var(--border)}
.lp-page .lp-input,.lp-page .lp-textarea,.lp-page .lp-select{transition:all .15s}
.lp-page .lp-input:hover,.lp-page .lp-textarea:hover,.lp-page .lp-select:hover{border-color:var(--blue-lo)}

/* === Hero floating accent shapes === */
.lp-hero-floats{position:absolute;inset:0;pointer-events:none;z-index:0}
.lp-float{position:absolute;border-radius:50%;filter:blur(40px);opacity:.5;animation:lp-float 8s ease-in-out infinite}
.lp-float.f1{width:120px;height:120px;background:var(--hot);top:15%;left:48%;animation-delay:0s}
.lp-float.f2{width:80px;height:80px;background:var(--purple);bottom:25%;right:35%;animation-delay:-3s}
@keyframes lp-float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-25px) scale(1.08)}}

/* === Footer richer === */
.lp-footer{background:radial-gradient(ellipse at top, #14203a 0%, #0a0f1c 70%);position:relative;overflow:hidden}
.lp-footer::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(122,160,255,0.4),rgba(255,140,40,0.3),rgba(160,80,255,0.4),transparent)}

/* === Scroll cue (hero) === */
.lp-scroll-cue{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-weight:600;pointer-events:none;opacity:.6}
.lp-scroll-cue-dot{width:18px;height:28px;border:1.5px solid var(--text-dim);border-radius:10px;position:relative}
.lp-scroll-cue-dot::after{content:'';position:absolute;left:50%;top:6px;transform:translateX(-50%);width:3px;height:6px;background:var(--text-dim);border-radius:2px;animation:lp-cue 1.8s ease-in-out infinite}
@keyframes lp-cue{0%,100%{transform:translateX(-50%) translateY(0);opacity:1}50%{transform:translateX(-50%) translateY(8px);opacity:.3}}

/* === Animated underline on H2 emphasis === */
.lp-page .lp-section-head .lp-h2{position:relative;display:inline-block}

/* === Section eyebrow doesn't get the chip background outside hero (kept consistent across) — already handled === */

/* === Lifecycle arrows: gradient === */

const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const fmt = (v,dp=1) => typeof v==='number' ? v.toFixed(dp) : String(v);

function useWave(init, lo, hi, step=0.5, ms=1800) {
  const [v,setV] = useState(init);
  const r = useRef(init);
  useEffect(()=>{
    const id=setInterval(()=>{ r.current=clamp(r.current+(Math.random()-.5)*step*4,lo,hi); setV(+r.current.toFixed(2)); },ms+Math.random()*600);
    return()=>clearInterval(id);
  },[]);
  return v;
}

function useSpark(init,n=40,lo,hi,step=0.5) {
  const [data,setData]=useState(()=>{
    const a=[init];
    for(let i=1;i<n;i++) a.push(clamp(a[i-1]+(Math.random()-.5)*step*4,lo,hi));
    return a;
  });
  useEffect(()=>{
    const id=setInterval(()=>setData(p=>{
      const last=p[p.length-1];
      return [...p.slice(1),clamp(last+(Math.random()-.5)*step*4,lo,hi)];
    }),1300);
    return()=>clearInterval(id);
  },[]);
  return data;
}

/* ══════════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════════ */
function Sparkline({data,color,h=50,fill=true,predicted=null}) {
  if(!data||data.length<2) return null;
  const all=[...data,...(predicted||[])];
  const mn=Math.min(...all),mx=Math.max(...all),rng=mx-mn||1;
  const W=200,H=h;
  const pt=(v,i,offset=0)=>[((i+offset)/(data.length+(predicted?predicted.length:1)-1))*W,H-((v-mn)/rng)*(H*.85)-H*.075];
  const apts=data.map((v,i)=>pt(v,i));
  const ppath=pts=>pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const ap=ppath(apts);
  const fp=`${ap} L${apts[apts.length-1][0]},${H} L0,${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="spark-svg" style={{height:h}}>
      {fill&&<path d={fp} fill={color} fillOpacity=".1"/>}
      <path d={ap} stroke={color} strokeWidth="1.5" fill="none" strokeLinejoin="round" strokeLinecap="round"/>
      {predicted&&<path d={`M${apts[apts.length-1][0]},${apts[apts.length-1][1]} `+predicted.map((v,i)=>{const p=pt(v,i,data.length-1);return`L${p[0]},${p[1]}`}).join(' ')} stroke={color} strokeWidth="1.5" fill="none" strokeDasharray="4 3" strokeOpacity=".45" strokeLinecap="round"/>}
      <circle cx={apts[apts.length-1][0]} cy={apts[apts.length-1][1]} r="3" fill={color} style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
    </svg>
  );
}

function ArcGauge({value,max,color,size=72,label,unit=''}) {
  const pct=clamp(value/max,0,1);
  const r=size*.38,cx=size/2,cy=size/2;
  const sa=-210,ea=30,arc=(ea-sa)*pct;
  const toR=d=>d*Math.PI/180;
  const pp=a=>[cx+r*Math.cos(toR(a)),cy+r*Math.sin(toR(a))];
  const [sx,sy]=pp(sa),[ex,ey]=pp(sa+arc),[bx,by]=pp(ea);
  const la=arc>180?1:0,bla=(ea-sa)>180?1:0;
  const dv=typeof value==='number'?(value>99?Math.round(value):value.toFixed(value<10?1:0)):value;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <path d={`M${sx},${sy} A${r},${r} 0 ${bla} 1 ${bx},${by}`} stroke="var(--surface-3)" strokeWidth="4.5" fill="none" strokeLinecap="round"/>
      {pct>0&&<path d={`M${sx},${sy} A${r},${r} 0 ${la} 1 ${ex},${ey}`} stroke={color} strokeWidth="4.5" fill="none" strokeLinecap="round" style={{filter:`drop-shadow(0 0 5px ${color}88)`}}/>}
      <text x={cx} y={cy-1} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={size*.19} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{dv}{unit}</text>
      {label&&<text x={cx} y={cy+size*.17} textAnchor="middle" fill="var(--text-dim)" fontSize={size*.1} fontFamily="'Space Grotesk',sans-serif">{label}</text>}
    </svg>
  );
}

function ScoreRing({score,color,label,size=78}) {
  const r=size*.4,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=(score/100)*circ;
  return (
    <div className="gauge-item">
      <svg width={size} height={size}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--surface-2)" strokeWidth="5.5"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="5.5"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ*.25} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 7px ${color}55)`,transition:'stroke-dasharray 1.5s ease'}}/>
        <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={size*.23} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{score}</text>
      </svg>
      <div className="gauge-sublabel">{label}</div>
    </div>
  );
}

function ParamRow({name,value,unit,lo,hi,color,dp=1}) {
  const pct=clamp((value-lo)/(hi-lo)*100,2,100);
  const warn=pct>82||pct<12;
  const col=warn?'var(--amber)':color;
  return (
    <div className="param-row">
      <div className="param-name">{name}</div>
      <div className="param-track"><div className="param-fill" style={{width:`${pct}%`,background:col}}/></div>
      <div className="param-val" style={{color:warn?'var(--amber)':'var(--text-mid)'}}>{fmt(value,dp)}{unit}</div>
    </div>
  );
}

function Clock() {

  return <span className="clock-tag">{t.toLocaleTimeString('en-AE',{hour12:false})} GST</span>;

    const totalPct=((tick*0.7+i*(100/dotCount))%100)/100;
    const segs=stages.length-1;
    const seg=Math.floor(totalPct*segs);
    const sp=(totalPct*segs)%1;
    const fr=stages[Math.min(seg,stages.length-1)];
    const to=stages[Math.min(seg+1,stages.length-1)];
    const x1=fr.x+fr.w,x2=to.x;
    return {x:x1+(x2-x1)*sp,y:100,color:fr.color};
  });
  return (
    <svg viewBox="0 0 900 200" preserveAspectRatio="xMidYMid meet" style={{width:'100%',height:'100%',display:'block'}}>
      {stages.slice(0,-1).map((s,i)=>{
        const nx=stages[i+1];
        return (<g key={s.id+'ln'}>
          <line x1={s.x+s.w} y1={100} x2={nx.x} y2={100} stroke="var(--surface-3)" strokeWidth="2"/>
          <line x1={s.x+s.w} y1={100} x2={nx.x} y2={100} stroke={s.color} strokeWidth="1.5" strokeOpacity=".3" strokeDasharray="6 4">
            <animate attributeName="stroke-dashoffset" from="0" to="-20" dur=".8s" repeatCount="indefinite"/>
          </line>
          <polygon points={`${nx.x-1},96 ${nx.x-1},104 ${nx.x+6},100`} fill={s.color} opacity=".5"/>
        </g>);
      })}
      {dots.map((d,i)=><circle key={i} cx={d.x} cy={d.y} r="2.5" fill={d.color} opacity=".75" style={{filter:`drop-shadow(0 0 3px ${d.color})`}}/>)}
      {stages.map(s=>{
        const ep=s.id==='ore'||s.id==='prod';
        const cy=100-s.h/2;
        return (
          <g key={s.id} onClick={()=>!ep&&onStageClick&&onStageClick(s.id)} style={{cursor:ep?'default':'pointer'}}>
            <rect x={s.x} y={cy} width={s.w} height={s.h} rx="8"
              fill="var(--bg2)" stroke={s.color} strokeWidth={ep?1:1.5} strokeOpacity={ep?.3:.65}
              style={{filter:ep?undefined:`drop-shadow(0 0 8px ${s.color}30)`}}/>
            <text x={s.x+s.w/2} y={cy+18} textAnchor="middle" fill={s.color} fontSize={ep?9:10} fontWeight="700" fontFamily="'Space Grotesk',sans-serif">{s.label.split(' ')[0]}</text>
            {s.label.split(' ').length>1&&<text x={s.x+s.w/2} y={cy+30} textAnchor="middle" fill={s.color} fontSize={10} fontWeight="700" fontFamily="'Space Grotesk',sans-serif">{s.label.split(' ').slice(1).join(' ')}</text>}
            <text x={s.x+s.w/2} y={cy+(ep?42:44)} textAnchor="middle" fill="var(--text-dim)" fontSize={8.5} fontFamily="'Space Grotesk',sans-serif" letterSpacing=".5">{s.sub}</text>
            {!ep&&<>
              <line x1={s.x+12} y1={cy+54} x2={s.x+s.w-12} y2={cy+54} stroke="var(--surface-3)" strokeWidth="1"/>
              <text x={s.x+s.w/2} y={cy+65} textAnchor="middle" fill="var(--text-dim)" fontSize={8} fontFamily="'Space Grotesk',sans-serif">{s.metric}</text>
              <text x={s.x+s.w/2} y={cy+77} textAnchor="middle" fill={s.color} fontSize={10} fontWeight="600" fontFamily="'JetBrains Mono',monospace">{s.val}</text>
            </>}
            {ep&&s.val&&<text x={s.x+s.w/2} y={cy+50} textAnchor="middle" fill={s.color} fontSize={10} fontWeight="600" fontFamily="'JetBrains Mono',monospace">{s.val}</text>}
          </g>
        );
      })}
    </svg>
  );
}
