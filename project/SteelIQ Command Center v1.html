<!DOCTYPE html><html lang="en"><head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteelIQ — Emirates Steel</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a12;--bg2:#0b1120;--bg3:#111928;--bg4:#161f30;
  --border:rgba(80,130,255,0.11);--border2:rgba(80,130,255,0.22);
  --blue:oklch(65% 0.22 248deg);--blue-lo:rgba(50,110,255,0.12);
  --amber:oklch(72% 0.19 65deg);--amber-lo:rgba(255,165,40,0.1);
  --green:oklch(68% 0.18 155deg);--green-lo:rgba(50,200,110,0.1);
  --purple:oklch(70% 0.2 290deg);--purple-lo:rgba(160,80,255,0.1);
  --red:oklch(62% 0.22 25deg);--red-lo:rgba(255,50,50,0.1);
  --text:#e8edf8;--text-dim:#5a6a8a;--text-mid:#8a9bbf;
  --mono:'JetBrains Mono',monospace;--sans:'Space Grotesk',sans-serif;
  --header-h:56px;--sb-open:230px;--sb-closed:54px;
  --radius:10px;--radius-sm:7px;
}
html,body,#root{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(50,100,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(50,100,255,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(80,130,255,0.2);border-radius:2px}

/* ── LOGIN ── */
.login-page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;overflow:hidden}
.login-bg{position:absolute;inset:0;background:url('uploads/steelIQ_image_poster.jpg') center/cover no-repeat;filter:brightness(.28) saturate(1.4)}
.login-bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(6,10,18,0.92) 0%,rgba(20,10,40,0.7) 100%)}
.login-card{position:relative;z-index:2;width:420px;max-width:calc(100vw - 32px);background:rgba(11,17,32,0.85);border:1px solid var(--border2);border-radius:16px;padding:36px 32px;backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(80,130,255,0.08)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-logo-mark{width:40px;height:40px;border-radius:10px;background:linear-gradient(140deg,var(--blue),oklch(55% 0.22 220deg));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;box-shadow:0 0 24px oklch(65% 0.22 248deg / 0.45)}
.login-logo-text{font-size:22px;font-weight:700;letter-spacing:-.5px}
.login-logo-text em{color:var(--blue);font-style:normal}
.login-logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.login-title{font-size:20px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--text-dim);margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:600;color:var(--text-mid);letter-spacing:.5px;margin-bottom:6px;display:block}
.form-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(50,110,255,0.12)}
.form-input::placeholder{color:var(--text-dim)}
.login-btn{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--blue),oklch(60% 0.22 230deg));color:#fff;border:none;cursor:pointer;font-family:var(--sans);transition:all .2s;letter-spacing:.3px;margin-top:4px;box-shadow:0 4px 20px rgba(50,110,255,0.3)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(50,110,255,0.4)}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.login-error{background:var(--red-lo);border:1px solid rgba(255,50,50,.25);border-radius:7px;padding:9px 12px;font-size:12px;color:var(--red);margin-top:12px}
.demo-accounts{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.demo-title{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.demo-grid{display:flex;flex-direction:column;gap:5px}
.demo-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:all .15s}
.demo-item:hover{background:rgba(50,110,255,0.08);border-color:rgba(50,110,255,0.2)}
.demo-avatar{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.demo-info{flex:1}
.demo-name{font-size:11px;font-weight:600}
.demo-role{font-size:9px;color:var(--text-dim)}
.demo-creds{font-family:var(--mono);font-size:9px;color:var(--text-dim);opacity:.6}

/* ── APP LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1;overflow:hidden}
.body-wrap{display:flex;flex:1;overflow:hidden}

/* ── HEADER ── */
.header{height:var(--header-h);display:flex;align-items:center;padding:0 16px 0 0;border-bottom:1px solid var(--border);background:rgba(6,10,18,0.96);backdrop-filter:blur(16px);flex-shrink:0;gap:0;z-index:50;position:relative}
.header-logo-zone{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--border);flex-shrink:0;min-width:var(--sb-closed);transition:min-width .28s;overflow:hidden}
.header-logo-zone.open{min-width:var(--sb-open)}
.logo-mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(140deg,var(--blue),oklch(55% 0.22 220deg));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;box-shadow:0 0 16px oklch(65% 0.22 248deg / 0.35);flex-shrink:0}
.logo-text{font-size:16px;font-weight:700;white-space:nowrap;letter-spacing:-.3px}
.logo-text em{color:var(--blue);font-style:normal}
.logo-sub{font-size:9px;color:var(--text-dim);letter-spacing:1.8px;text-transform:uppercase}
.hamburger{padding:6px;border-radius:6px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;display:none;align-items:center;margin-left:8px}
.header-kpis{display:flex;align-items:center;flex:1;padding:0 16px;gap:0;overflow:hidden}
.hkpi{padding:0 16px;border-right:1px solid var(--border);flex-shrink:0}
.hkpi:first-child{padding-left:0}
.hkpi-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.hkpi-val{font-family:var(--mono);font-size:14px;font-weight:600}
.header-right{display:flex;align-items:center;gap:10px;padding-left:12px;flex-shrink:0}
.status-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(50,200,100,0.07);border:1px solid rgba(50,200,100,0.2);font-size:10px;color:var(--green);font-weight:500;white-space:nowrap}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pgn 2s infinite}
@keyframes pgn{0%,100%{box-shadow:0 0 0 0 rgba(50,200,100,0.5)}50%{box-shadow:0 0 0 5px rgba(50,200,100,0)}}
.heat-tag{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--amber-lo);border:1px solid rgba(255,165,40,0.25);color:var(--amber);white-space:nowrap}
.clock-tag{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap}
/* User menu */
.user-btn{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative}
.user-btn:hover{background:rgba(255,255,255,0.07);border-color:var(--border2)}
.user-avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.user-name{font-size:11px;font-weight:600;white-space:nowrap}
.user-role-tag{font-size:9px;color:var(--text-dim)}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:200px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:6px;box-shadow:0 16px 48px rgba(0,0,0,0.5);z-index:200;backdrop-filter:blur(16px)}
.ud-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--text-mid);transition:all .15s}
.ud-item:hover{background:rgba(255,255,255,0.05);color:var(--text)}
.ud-item.danger:hover{background:var(--red-lo);color:var(--red)}
.ud-divider{height:1px;background:var(--border);margin:4px 0}
.notif-btn{width:32px;height:32px;border-radius:7px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-dim);font-size:14px;position:relative;transition:all .2s}
.notif-btn:hover{background:rgba(255,255,255,0.08);color:var(--text)}
.notif-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;border-radius:50%;background:var(--red);border:1px solid var(--bg)}

/* ── SIDEBAR ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;backdrop-filter:blur(2px)}
.sidebar{width:var(--sb-open);flex-shrink:0;border-right:1px solid var(--border);background:rgba(6,10,18,0.97);display:flex;flex-direction:column;transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden;z-index:41;position:relative}
.sidebar.closed{width:var(--sb-closed)}
.sb-toggle-row{height:42px;display:flex;align-items:center;justify-content:flex-end;padding:0 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-toggle-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:5px 7px;border-radius:5px;font-size:12px;transition:all .2s}
.sb-toggle-btn:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.sb-item{width:100%;display:flex;align-items:center;gap:10px;padding:8px 11px;background:none;border:none;cursor:pointer;color:var(--text-dim);transition:all .18s;white-space:nowrap;text-align:left}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.sb-item.active{color:var(--text);background:rgba(255,255,255,0.05)}
.sb-icon-wrap{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s;font-weight:700}
.si-ov{background:rgba(255,255,255,0.06);color:var(--text-mid)}
.si-q{background:var(--blue-lo);color:var(--blue)}
.si-e{background:var(--amber-lo);color:var(--amber)}
.si-g{background:var(--green-lo);color:var(--green)}
.si-ad{background:var(--purple-lo);color:var(--purple)}
.si-al{background:var(--red-lo);color:var(--red)}
.sb-label{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis}
.sb-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;letter-spacing:.8px;flex-shrink:0}
.sb-chevron{font-size:9px;flex-shrink:0;transition:transform .2s;opacity:.5}
.sb-chevron.open{transform:rotate(180deg)}
.sb-sub{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sb-sub.open{max-height:280px}
.sb-sub-btn{width:100%;display:flex;align-items:center;gap:8px;padding:6px 12px 6px 51px;background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-dim);transition:all .15s;text-align:left;white-space:nowrap}
.sb-sub-btn:hover{color:var(--text);background:rgba(255,255,255,0.03)}
.sb-sub-btn.active{color:var(--blue);background:var(--blue-lo)}
.sb-sub-btn::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.7}
.sb-divider{height:1px;background:var(--border);margin:6px 10px}
/* Sidebar bottom user zone */
.sb-bottom{border-top:1px solid var(--border);padding:10px;flex-shrink:0}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);cursor:pointer;transition:all .2s;overflow:hidden;white-space:nowrap}
.sb-user:hover{background:rgba(255,255,255,0.06)}
.sb-user-info{flex:1;overflow:hidden}
.sb-user-name{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:9px;color:var(--text-dim);letter-spacing:.3px;margin-top:1px}
.sb-logout{padding:6px;border-radius:6px;background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:14px;transition:all .2s;flex-shrink:0}
.sb-logout:hover{color:var(--red);background:var(--red-lo)}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
.submod-tabs{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 20px;height:40px;flex-shrink:0;background:rgba(8,12,22,0.6);overflow-x:auto;gap:0}
.sm-tab{padding:0 13px;height:100%;font-size:11px;font-weight:500;color:var(--text-dim);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:all .18s;white-space:nowrap;font-family:var(--sans)}
.sm-tab:hover{color:var(--text)}
.sm-tab.active-q{color:var(--blue);border-bottom-color:var(--blue)}
.sm-tab.active-e{color:var(--amber);border-bottom-color:var(--amber)}
.sm-tab.active-g{color:var(--green);border-bottom-color:var(--green)}
.sm-tab.active-ad{color:var(--purple);border-bottom-color:var(--purple)}
.content{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--border)}
.card-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.card-body{padding:14px}
.badge{font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.badge-q{background:var(--blue-lo);color:var(--blue);border:1px solid rgba(50,110,255,.22)}
.badge-e{background:var(--amber-lo);color:var(--amber);border:1px solid rgba(255,165,40,.22)}
.badge-g{background:var(--green-lo);color:var(--green);border:1px solid rgba(50,200,110,.22)}
.badge-ad{background:var(--purple-lo);color:var(--purple);border:1px solid rgba(160,80,255,.22)}
.badge-ai{background:rgba(0,210,210,0.1);color:oklch(72% 0.15 190deg);border:1px solid rgba(0,210,210,.2)}
.badge-sys{background:rgba(140,160,200,0.1);color:var(--text-mid);border:1px solid rgba(140,160,200,.15)}
.live-chip{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--green);font-weight:600;letter-spacing:.8px;padding:2px 7px;border-radius:10px;background:var(--green-lo)}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pgn 1.5s infinite}

/* ── GRID HELPERS ── */
.row{display:flex;gap:14px}
.col{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── METRIC BOX ── */
.metric-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.metric-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.metric-val{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1}
.metric-sub{font-size:10px;color:var(--text-dim);margin-top:4px}
.metric-sub.ok{color:var(--green)}.metric-sub.warn{color:var(--amber)}.metric-sub.crit{color:var(--red)}

/* ── PARAM ROW ── */
.param-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.param-name{font-size:11px;color:var(--text-mid);width:145px;flex-shrink:0}
.param-track{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.param-fill{height:100%;border-radius:3px;transition:width 1.5s ease}
.param-val{font-family:var(--mono);font-size:11px;width:72px;text-align:right;flex-shrink:0}

/* ── SPARKLINE ── */
.spark-svg{display:block;width:100%;overflow:visible}

/* ── ALERT ITEMS ── */
.alert-item{padding:9px 11px;border-radius:7px;border-left:2px solid;margin-bottom:6px;background:rgba(255,255,255,0.02)}
.alert-item.crit{border-color:var(--red);animation:apulse 2.5s infinite}
.alert-item.warn{border-color:var(--amber)}
.alert-item.info{border-color:var(--blue)}
@keyframes apulse{0%,100%{background:rgba(255,50,50,0.02)}50%{background:rgba(255,50,50,0.07)}}
.alert-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.alert-title{font-size:11px;font-weight:600}
.alert-time{font-family:var(--mono);font-size:10px;color:var(--text-dim)}
.alert-desc{font-size:10px;color:var(--text-mid);line-height:1.5}

/* ── GAUGE ── */
.gauge-row{display:flex;justify-content:space-around;align-items:center}
.gauge-item{display:flex;flex-direction:column;align-items:center;gap:5px}
.gauge-sublabel{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;text-align:center}

/* ── NLP ── */
.nlp-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:8px;padding:10px 12px}
.nlp-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:12px;flex:1}
.nlp-input::placeholder{color:var(--text-dim)}
.nlp-btn{padding:5px 12px;border-radius:5px;font-size:11px;font-weight:700;background:var(--blue);color:#fff;border:none;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.nlp-chip{font-size:10px;padding:3px 9px;border-radius:20px;background:var(--blue-lo);border:1px solid rgba(50,110,255,.2);color:var(--blue);cursor:pointer;white-space:nowrap}
.nlp-result{padding:12px 13px;background:rgba(50,110,255,0.04);border:1px solid rgba(50,110,255,0.15);border-radius:8px;font-size:12px;color:var(--text-mid);line-height:1.7;margin-top:10px}

/* ── DEFECT CARD ── */
.defect-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px}
.defect-track{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:8px}
.defect-fill{height:100%;border-radius:2px;transition:width 1.5s}

/* ── QEG OVERVIEW CARDS ── */
.qeg-card{border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.qeg-card:hover{transform:translateY(-2px)}
.qeg-card.q{background:linear-gradient(140deg,rgba(50,110,255,0.1),rgba(50,110,255,0.04));border:1px solid rgba(50,110,255,.22)}
.qeg-card.e{background:linear-gradient(140deg,rgba(255,165,40,0.1),rgba(255,165,40,0.04));border:1px solid rgba(255,165,40,.22)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ══════════════════════════════════════════════
   RBAC CONFIG
══════════════════════════════════════════════ */
const USERS = [
  { id:1, email:'admin@emsteel.ae',   pass:'Admin@123',  name:'Khalid Al Mazrouei', role:'super_admin',    initials:'KM', color:'#4a7fff' },
  { id:2, email:'manager@emsteel.ae', pass:'Mgr@123',    name:'Sarah Johnson',      role:'plant_manager',  initials:'SJ', color:'#a060ff' },
  { id:3, email:'castx@emsteel.ae',   pass:'CastX@123',  name:'Ahmed Hassan',       role:'castx_operator', initials:'AH', color:'#4a7fff' },
  { id:4, email:'eaf@emsteel.ae',     pass:'EAF@123',    name:'Ravi Kumar',         role:'eaf_operator',   initials:'RK', color:'#ffa528' },
  { id:5, email:'dri@emsteel.ae',     pass:'DRI@123',    name:'Fatima Al Ali',      role:'dri_operator',   initials:'FA', color:'#3acc7a' },
];

const ROLE_LABELS = {
  super_admin:'Super Admin', plant_manager:'Plant Manager',
  castx_operator:'CastX Operator', eaf_operator:'EAF Operator', dri_operator:'DRI Operator'
};

const ROLE_ACCESS = {
  super_admin:   ['overview','q','e','g','admin','alerts'],
  plant_manager: ['overview','q','e','g','alerts'],
  castx_operator:['overview','q','alerts'],
  eaf_operator:  ['overview','e','alerts'],
  dri_operator:  ['overview','g','alerts'],
};

const canAccess = (role, mod) => (ROLE_ACCESS[role]||[]).includes(mod);

/* ══════════════════════════════════════════════
   UTILITIES & HOOKS
══════════════════════════════════════════════ */
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const fmt = (v,dp=1) => typeof v==='number' ? v.toFixed(dp) : String(v);

function useWave(init, lo, hi, step=0.5, ms=1800) {
  const [v,setV] = useState(init);
  const r = useRef(init);
  useEffect(()=>{
    const id=setInterval(()=>{ r.current=clamp(r.current+(Math.random()-.5)*step*4,lo,hi); setV(+r.current.toFixed(2)); },ms+Math.random()*600);
    return()=>clearInterval(id);
  },[]);
  return v;
}

function useSpark(init,n=40,lo,hi,step=0.5) {
  const [data,setData]=useState(()=>{
    const a=[init];
    for(let i=1;i<n;i++) a.push(clamp(a[i-1]+(Math.random()-.5)*step*4,lo,hi));
    return a;
  });
  useEffect(()=>{
    const id=setInterval(()=>setData(p=>{
      const last=p[p.length-1];
      return [...p.slice(1),clamp(last+(Math.random()-.5)*step*4,lo,hi)];
    }),1300);
    return()=>clearInterval(id);
  },[]);
  return data;
}

/* ══════════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════════ */
function Sparkline({data,color,h=50,fill=true,predicted=null}) {
  if(!data||data.length<2) return null;
  const all=[...data,...(predicted||[])];
  const mn=Math.min(...all),mx=Math.max(...all),rng=mx-mn||1;
  const W=200,H=h;
  const pt=(v,i,offset=0)=>[((i+offset)/(data.length+(predicted?predicted.length:1)-1))*W,H-((v-mn)/rng)*(H*.85)-H*.075];
  const apts=data.map((v,i)=>pt(v,i));
  const ppath=pts=>pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const ap=ppath(apts);
  const fp=`${ap} L${apts[apts.length-1][0]},${H} L0,${H} Z`;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" className="spark-svg" style={{height:h}}>
      {fill&&<path d={fp} fill={color} fillOpacity=".1"/>}
      <path d={ap} stroke={color} strokeWidth="1.5" fill="none" strokeLinejoin="round" strokeLinecap="round"/>
      {predicted&&<path d={`M${apts[apts.length-1][0]},${apts[apts.length-1][1]} `+predicted.map((v,i)=>{const p=pt(v,i,data.length-1);return`L${p[0]},${p[1]}`}).join(' ')} stroke={color} strokeWidth="1.5" fill="none" strokeDasharray="4 3" strokeOpacity=".45" strokeLinecap="round"/>}
      <circle cx={apts[apts.length-1][0]} cy={apts[apts.length-1][1]} r="3" fill={color} style={{filter:`drop-shadow(0 0 4px ${color})`}}/>
    </svg>
  );
}

function ArcGauge({value,max,color,size=72,label,unit=''}) {
  const pct=clamp(value/max,0,1);
  const r=size*.38,cx=size/2,cy=size/2;
  const sa=-210,ea=30,arc=(ea-sa)*pct;
  const toR=d=>d*Math.PI/180;
  const pp=a=>[cx+r*Math.cos(toR(a)),cy+r*Math.sin(toR(a))];
  const [sx,sy]=pp(sa),[ex,ey]=pp(sa+arc),[bx,by]=pp(ea);
  const la=arc>180?1:0,bla=(ea-sa)>180?1:0;
  const dv=typeof value==='number'?(value>99?Math.round(value):value.toFixed(value<10?1:0)):value;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <path d={`M${sx},${sy} A${r},${r} 0 ${bla} 1 ${bx},${by}`} stroke="rgba(255,255,255,0.06)" strokeWidth="4.5" fill="none" strokeLinecap="round"/>
      {pct>0&&<path d={`M${sx},${sy} A${r},${r} 0 ${la} 1 ${ex},${ey}`} stroke={color} strokeWidth="4.5" fill="none" strokeLinecap="round" style={{filter:`drop-shadow(0 0 5px ${color}88)`}}/>}
      <text x={cx} y={cy-1} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={size*.19} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{dv}{unit}</text>
      {label&&<text x={cx} y={cy+size*.17} textAnchor="middle" fill="rgba(140,160,200,.7)" fontSize={size*.1} fontFamily="'Space Grotesk',sans-serif">{label}</text>}
    </svg>
  );
}

function ScoreRing({score,color,label,size=78}) {
  const r=size*.4,cx=size/2,cy=size/2,circ=2*Math.PI*r,dash=(score/100)*circ;
  return (
    <div className="gauge-item">
      <svg width={size} height={size}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="5.5"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="5.5"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ*.25} strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 7px ${color}55)`,transition:'stroke-dasharray 1.5s ease'}}/>
        <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize={size*.23} fontWeight="700" fontFamily="'JetBrains Mono',monospace">{score}</text>
      </svg>
      <div className="gauge-sublabel">{label}</div>
    </div>
  );
}

function ParamRow({name,value,unit,lo,hi,color,dp=1}) {
  const pct=clamp((value-lo)/(hi-lo)*100,2,100);
  const warn=pct>82||pct<12;
  const col=warn?'var(--amber)':color;
  return (
    <div className="param-row">
      <div className="param-name">{name}</div>
      <div className="param-track"><div className="param-fill" style={{width:`${pct}%`,background:col}}/></div>
      <div className="param-val" style={{color:warn?'var(--amber)':'var(--text-mid)'}}>{fmt(value,dp)}{unit}</div>
    </div>
  );
}

function Clock() {
  const [t,setT]=useState(new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(id)},[]);
  return <span className="clock-tag">{t.toLocaleTimeString('en-AE',{hour12:false})} GST</span>;
}

function ProcessImage({src,alt,caption}) {
  const [zoomed,setZoomed]=useState(false);
  return (<>
    <div className="process-img-wrap" onClick={()=>setZoomed(true)}>
      <img src={src} alt={alt} className="process-img"/>
      <div className="img-zoom-hint">⤢ Click to enlarge</div>
    </div>
    {caption&&<div style={{fontSize:10,color:'var(--text-dim)',marginTop:6,textAlign:'center'}}>{caption}</div>}
    {zoomed&&<div className="modal-overlay" onClick={()=>setZoomed(false)} style={{zIndex:300}}>
      <img src={src} alt={alt} style={{maxWidth:'92vw',maxHeight:'88vh',borderRadius:10,boxShadow:'0 24px 80px rgba(0,0,0,.8)'}}/>
    </div>}
  </>);
}

/* ══════════════════════════════════════════════
   NLP PANEL
══════════════════════════════════════════════ */
const NLP_ANSWERS = {
  'mould level':'📊 Mould Level — Last 3 Heats:\n• Heat 2845: avg 142mm (±2mm) — Stable\n• Heat 2846: avg 139mm (±5mm) — Minor oscillation at 14:22\n• Heat 2847 (active): avg 144mm (±2mm) — Stable\nBreakout risk: LOW (4%).',

function NLPPanel() {
  const [q,setQ]=useState('');const [res,setRes]=useState(null);const [loading,setLoading]=useState(false);
  const run=useCallback((query=q)=>{
    if(!query.trim()) return;
    setLoading(true);setRes(null);
    setTimeout(()=>{ const k=Object.keys(NLP_ANSWERS).find(k=>query.toLowerCase().includes(k))||'mould level'; setRes(NLP_ANSWERS[k]);setLoading(false); },900);
  },[q]);
  return (
    <div className="col">
      <div className="nlp-bar">
        <span style={{color:'var(--blue)',fontSize:16,flexShrink:0}}>⌘</span>
        <input className="nlp-input" placeholder='Ask in plain English — e.g. "Show EAF energy trend"' value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&run()}/>
        <button className="nlp-btn" onClick={()=>run()}>Ask AI</button>
      </div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['Mould level last 3 heats','EAF energy trend','Defect prediction','Gas status','Outliers','Metallization forecast'].map(s=>(
          <span key={s} className="nlp-chip" onClick={()=>{setQ(s);run(s)}}>{s}</span>
        ))}
      </div>
      {loading&&<div style={{display:'flex',gap:5,alignItems:'center',color:'var(--text-dim)',fontSize:11,padding:8}}>
        {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--blue)',animation:`pgn ${1.2+i*.15}s infinite ${i*.15}s`}}/>)}

      </div>}
      {res&&<div className="nlp-result">{res.split('\n').map((l,i)=><div key={i} style={{marginBottom:l.startsWith('•')?3:0}}>{l}</div>)}</div>}
    </div>
  );
}

function ProcessFlow({onStageClick}) {
  const [tick,setTick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>setTick(t=>t+1),70);return()=>clearInterval(id)},[]);
  const stages=[
    {id:'ore',label:'Iron Ore',sub:'Raw Material',color:'#8a9bbf',x:18,w:90,h:60,metric:'',val:''},
    {id:'dri',label:'DRI Reactor',sub:'Gas Reduction',color:'#3acc7a',x:135,w:130,h:88,metric:'Metallization',val:'92.4%'},
    {id:'eaf',label:'Elec. Arc Furnace',sub:'Melting (EAF)',color:'#ffa528',x:300,w:135,h:88,metric:'Energy',val:'412 kWh/t'},
    {id:'lf',label:'Ladle Furnace',sub:'Refining (LF)',color:'#a060ff',x:470,w:120,h:88,metric:'Temp',val:'1596°C'},
    {id:'cast',label:'Cont. Casting',sub:'Solidification',color:'#3a78ff',x:625,w:125,h:88,metric:'Speed',val:'1.4 m/min'},
    {id:'prod',label:'Steel Billet',sub:'Final Product',color:'#8a9bbf',x:785,w:90,h:60,metric:'Yield',val:'94.2%'},
  ];
  const dotCount=10;
  const dots=Array.from({length:dotCount},(_,i)=>{
    const totalPct=((tick*0.7+i*(100/dotCount))%100)/100;
    const segs=stages.length-1;
    const seg=Math.floor(totalPct*segs);
    const sp=(totalPct*segs)%1;
    const fr=stages[Math.min(seg,stages.length-1)];
    const to=stages[Math.min(seg+1,stages.length-1)];
    const x1=fr.x+fr.w,x2=to.x;
    return {x:x1+(x2-x1)*sp,y:100,color:fr.color};
  });
  return (
    <svg viewBox="0 0 900 200" preserveAspectRatio="xMidYMid meet" style={{width:'100%',height:'100%',display:'block'}}>
      {stages.slice(0,-1).map((s,i)=>{
        const nx=stages[i+1];
        return (<g key={s.id+'ln'}>
          <line x1={s.x+s.w} y1={100} x2={nx.x} y2={100} stroke="rgba(255,255,255,0.07)" strokeWidth="2"/>
          <line x1={s.x+s.w} y1={100} x2={nx.x} y2={100} stroke={s.color} strokeWidth="1.5" strokeOpacity=".3" strokeDasharray="6 4">
            <animate attributeName="stroke-dashoffset" from="0" to="-20" dur=".8s" repeatCount="indefinite"/>
          </line>
          <polygon points={`${nx.x-1},96 ${nx.x-1},104 ${nx.x+6},100`} fill={s.color} opacity=".5"/>
        </g>);
      })}
      {dots.map((d,i)=><circle key={i} cx={d.x} cy={d.y} r="2.5" fill={d.color} opacity=".75" style={{filter:`drop-shadow(0 0 3px ${d.color})`}}/>)}
      {stages.map(s=>{
        const ep=s.id==='ore'||s.id==='prod';
        const cy=100-s.h/2;
        return (
          <g key={s.id} onClick={()=>!ep&&onStageClick&&onStageClick(s.id)} style={{cursor:ep?'default':'pointer'}}>
            <rect x={s.x} y={cy} width={s.w} height={s.h} rx="8"
              fill="rgba(8,12,24,0.88)" stroke={s.color} strokeWidth={ep?1:1.5} strokeOpacity={ep?.3:.65}
              style={{filter:ep?undefined:`drop-shadow(0 0 8px ${s.color}30)`}}/>
            <text x={s.x+s.w/2} y={cy+18} textAnchor="middle" fill={s.color} fontSize={ep?9:10} fontWeight="700" fontFamily="'Space Grotesk',sans-serif">{s.label.split(' ')[0]}</text>
            {s.label.split(' ').length>1&&<text x={s.x+s.w/2} y={cy+30} textAnchor="middle" fill={s.color} fontSize={10} fontWeight="700" fontFamily="'Space Grotesk',sans-serif">{s.label.split(' ').slice(1).join(' ')}</text>}
            <text x={s.x+s.w/2} y={cy+(ep?42:44)} textAnchor="middle" fill="rgba(140,160,200,.55)" fontSize={8.5} fontFamily="'Space Grotesk',sans-serif" letterSpacing=".5">{s.sub}</text>
            {!ep&&<>
              <line x1={s.x+12} y1={cy+54} x2={s.x+s.w-12} y2={cy+54} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>
              <text x={s.x+s.w/2} y={cy+65} textAnchor="middle" fill="rgba(140,160,200,.45)" fontSize={8} fontFamily="'Space Grotesk',sans-serif">{s.metric}</text>
              <text x={s.x+s.w/2} y={cy+77} textAnchor="middle" fill={s.color} fontSize={10} fontWeight="600" fontFamily="'JetBrains Mono',monospace">{s.val}</text>
            </>}
            {ep&&s.val&&<text x={s.x+s.w/2} y={cy+50} textAnchor="middle" fill={s.color} fontSize={10} fontWeight="600" fontFamily="'JetBrains Mono',monospace">{s.val}</text>}
          </g>
        );
      })}
    </svg>
  );
}

              /* Grouped tree */
              groups.map(g=>(
                <div key={g.mod} className="ai-module-group">
                  <div className={`ai-module-head${activeModule===g.mod?' active-group':''}`}
                    onClick={()=>setExpanded(p=>({...p,[g.mod]:!p[g.mod]}))}>
                    <div className={`ai-module-icon ${g.isCls}`} style={{background:`${g.color}18`,color:g.color}}>{g.icon}</div>
                    <div className="ai-module-label" style={{color:activeModule===g.mod?'var(--text)':'var(--text-mid)'}}>{g.label}</div>
                    <div style={{fontSize:9,color:'var(--text-dim)',marginRight:4}}>{g.items.length}</div>
                    <div className={`ai-mod-chevron${expanded[g.mod]?' open':''}`}>▶</div>
                  </div>
                  <div className={`ai-sub-list${expanded[g.mod]?' open':''}`}>
                    {g.items.map((item,ii)=>(
                      <div key={ii}>
                        <div className={`ai-sub-item${activeModule===item.mod&&activeSub===item.sub?' active':''}`}
                          onClick={()=>setModule(item.mod, item.sub)}>
                          <div className="ai-sub-dot"/>
                          <div className="ai-sub-label" style={{color:activeModule===item.mod&&activeSub===item.sub?item.color:'var(--text-mid)'}}>{item.label}</div>
                        </div>
                        {/* Key points expanded */}
                        {activeModule===item.mod&&activeSub===item.sub && item.points.map((pt,pi)=>(
                          <div key={pi} style={{padding:'5px 14px 5px 60px',background:'rgba(160,80,255,0.03)',borderLeft:'2px solid rgba(160,80,255,0.12)'}}>
                            <div style={{fontSize:10,fontWeight:600,color:item.color,marginBottom:1}}>→ {pt.t}</div>
                            <div style={{fontSize:9,color:'var(--text-dim)',lineHeight:1.4}}>{pt.d}</div>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </>}

          {activeTab==='insights' && <>
            <div className="ai-section-head"><div className="ai-section-label">AI-Generated Insights</div><div className="ai-section-count">6</div></div>
            <div style={{padding:'4px 0'}}>
              {INSIGHTS.map((ins,i)=>(
                <div key={i} className="ai-insight-card" onClick={()=>setModule(ins.mod,ins.sub)}>
                  <div className="ai-insight-head">
                    <div className="ai-insight-sev" style={{background:sevColor(ins.sev),boxShadow:`0 0 6px ${sevColor(ins.sev)}66`}}/>
                    <div className="ai-insight-title" style={{color:sevColor(ins.sev)}}>{ins.title}</div>
                    <span style={{marginLeft:'auto',fontSize:9,color:'var(--text-dim)',fontFamily:'var(--mono)'}}>{ins.mod.toUpperCase()}</span>
                  </div>
                  <div className="ai-insight-desc">{ins.desc}</div>
                </div>
              ))}
            </div>
            {/* Live data snapshot */}
            <div className="ai-section-head" style={{marginTop:4}}><div className="ai-section-label">Live Plant Snapshot</div></div>
            <div style={{padding:'0 14px 14px',display:'flex',flexDirection:'column',gap:6}}>
              {[
                {l:'Tundish Temp',v:`${liveData.tundishTemp.toFixed(0)}°C`,c:Math.abs(liveData.tundishTemp-1545)<15?'var(--green)':'var(--red)'},
                {l:'EAF Energy',v:`${liveData.eafKwh.toFixed(0)} kWh/t`,c:liveData.eafKwh<400?'var(--green)':'var(--amber)'},
                {l:'Metallization',v:`${liveData.metallization.toFixed(1)}%`,c:liveData.metallization>91?'var(--green)':'var(--amber)'},
                {l:'Arc Stability',v:`${liveData.arcStability.toFixed(0)}%`,c:liveData.arcStability>85?'var(--green)':'var(--amber)'},
                {l:'Gas Flow',v:`${(liveData.gasFlow/1000).toFixed(1)}k Nm³/h`,c:'var(--text-mid)'},
                {l:'Yield',v:`${liveData.yieldPct.toFixed(1)}%`,c:'var(--green)'},
              ].map(kv=>(
                <div key={kv.l} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:'rgba(255,255,255,0.02)',borderRadius:6,border:'1px solid rgba(255,255,255,0.05)'}}>
                  <span style={{fontSize:11,color:'var(--text-dim)'}}>{kv.l}</span>
                  <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:kv.c}}>{kv.v}</span>
                </div>
              ))}
            </div>
          </>}
        </div>
      </div>
    </>
  );
}

/* ══════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════ */
const MODULE_CONFIG = [
  {id:'overview',label:'Command Center',icon:'◈',cls:'si-ov',access:'overview'},
  {id:'q',label:'Quality — CastX',icon:'Q',cls:'si-q',badge:'Q',access:'q',subs:['Outlier Detection','Defect Prediction','Snapshot Visualization','NLP Analytics','Time-Series Prediction']},
  {id:'e',label:'Electrical — EAF',icon:'E',cls:'si-e',badge:'E',access:'e',subs:['Energy Optimization','Arc Stability','Charge Mix','Tap-to-Tap','Predictive Maintenance']},
  {id:'g',label:'Gas — DRI/DRP',icon:'G',cls:'si-g',badge:'G',access:'g',subs:['Gas Consumption','Metallization Prediction','Temperature Profile','Process Yield','Anomaly Detection']},
  {id:'admin',label:'Administration',icon:'⚙',cls:'si-ad',badge:'ADMIN',access:'admin',subs:ADMIN_SUBS},
  {id:'alerts',label:'Alerts',icon:'!',cls:'si-al',access:'alerts'},
];

function MainApp({user,onLogout}) {
  const [sbOpen,setSbOpen]=useState(true);
  const [mobileOpen,setMobileOpen]=useState(false);
  const [activeModule,setActiveModule]=useState('overview');
  const [activeSub,setActiveSub]=useState('Outlier Detection');
  const [expanded,setExpanded]=useState({q:true,e:false,g:false,admin:false});
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [aiOpen,setAiOpen]=useState(false);
  const userMenuRef=useRef();

  useEffect(()=>{
    const check=(e)=>{ if(userMenuRef.current&&!userMenuRef.current.contains(e.target)) setShowUserMenu(false); };
    document.addEventListener('mousedown',check);return()=>document.removeEventListener('mousedown',check);
  },[]);

  // Live data
  const tundishTemp=useWave(1550,1510,1590,8);const mouldLevel=useWave(142,128,158,3);const castSpeed=useWave(1.4,1.1,1.8,.06);
  const eafKwh=useWave(408,380,440,5);const eafTemp=useWave(1618,1580,1660,10);const arcStability=useWave(87,72,98,2);
  const gasFlow=useWave(28400,26000,31000,400);const metallization=useWave(92.3,88,96,.4);const tapTime=useWave(44,38,52,1);
  const yieldPct=useWave(94.2,91,97,.3);const defectRisk=useWave(61,45,78,4);
  const qScore=Math.round(clamp(92-(tundishTemp-1545)*.3,70,99));
  const eScore=Math.round(clamp(100-(eafKwh-390)*.5,60,99));
  const gScore=Math.round(clamp(metallization*1.02,70,99));
  const liveData={tundishTemp,mouldLevel,castSpeed,eafKwh,eafTemp,arcStability,gasFlow,metallization,tapTime,yieldPct,qScore,eScore,gScore,defectRisk};

  const setModule=(mod,sub)=>{
    if(!canAccess(user.role,mod)) return;
    setActiveModule(mod);if(sub) setActiveSub(sub);
    setExpanded(p=>({...p,[mod]:true}));setMobileOpen(false);
  };

  const visibleModules=MODULE_CONFIG.filter(m=>canAccess(user.role,m.access));
  const curModule=MODULE_CONFIG.find(m=>m.id===activeModule);
  const curSubs=curModule?.subs||[];
  const subColorCls=activeModule==='q'?'active-q':activeModule==='e'?'active-e':activeModule==='g'?'active-g':activeModule==='admin'?'active-ad':'active-q';

  const roleColors={'super_admin':'#a060ff','plant_manager':'#4a7fff','castx_operator':'#4a7fff','eaf_operator':'#ffa528','dri_operator':'#3acc7a'};
  const userColor=roleColors[user.role]||'var(--blue)';

  return (
    <div className="app" onClick={()=>showUserMenu&&setShowUserMenu(false)}>
      {/* HEADER */}
      <header className="header">
        <div className={`header-logo-zone${sbOpen?' open':''}`}>
          <button className="hamburger" onClick={()=>setMobileOpen(o=>!o)}>☰</button>
          <div className="logo-mark">SQ</div>
          {sbOpen&&<div><div className="logo-text">Steel<em>IQ</em></div><div className="logo-sub">Emirates Steel</div></div>}
          {!sbOpen&&<div style={{display:'none'}} className="logo-text-hidden"/>}
        </div>
        <div className="header-kpis">
          {[{l:'Yield',v:`${yieldPct.toFixed(1)}%`,c:yieldPct>93?'var(--green)':'var(--amber)'},{l:'EAF Energy',v:`${eafKwh.toFixed(0)} kWh/t`,c:eafKwh<400?'var(--green)':'var(--amber)'},{l:'Metallization',v:`${metallization.toFixed(1)}%`,c:metallization>91?'var(--green)':'var(--amber)'},{l:'Tundish Temp',v:`${tundishTemp.toFixed(0)}°C`,c:Math.abs(tundishTemp-1545)<15?'var(--blue)':'var(--red)'},{l:'Tap-to-Tap',v:`${tapTime.toFixed(0)} min`,c:tapTime<46?'var(--green)':'var(--amber)'}].map(m=>(
            <div key={m.l} className="hkpi"><div className="hkpi-label">{m.l}</div><div className="hkpi-val" style={{color:m.c}}>{m.v}</div></div>
          ))}
        </div>
        <div className="header-right">
          <div className="heat-tag">HEAT #2847</div>
          <div className="status-pill"><div className="sdot"/>LIVE</div>
          <Clock/>
          <div className="notif-btn" title="Notifications"><span>🔔</span><div className="notif-badge"/></div>
          <div ref={userMenuRef} style={{position:'relative'}}>
            <div className="user-btn" onClick={e=>{e.stopPropagation();setShowUserMenu(o=>!o)}}>
              <div className="user-avatar" style={{background:`${userColor}22`,border:`1px solid ${userColor}44`,color:userColor}}>{user.initials}</div>
              <div style={{display:'none'}} className="user-name-wrap">
                <div className="user-name">{user.name.split(' ')[0]}</div>
                <div className="user-role-tag">{ROLE_LABELS[user.role]}</div>
              </div>
              <span style={{fontSize:10,color:'var(--text-dim)'}}>▾</span>
            </div>
            {showUserMenu&&(
              <div className="user-dropdown" onClick={e=>e.stopPropagation()}>
                <div style={{padding:'10px 10px 8px',borderBottom:'1px solid var(--border)',marginBottom:4}}>
                  <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:0}}>
                    <div style={{width:32,height:32,borderRadius:8,background:`${userColor}22`,border:`1px solid ${userColor}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:userColor}}>{user.initials}</div>
                    <div><div style={{fontSize:12,fontWeight:700}}>{user.name}</div><div style={{fontSize:10,color:userColor}}>{ROLE_LABELS[user.role]}</div><div style={{fontSize:10,color:'var(--text-dim)'}}>{user.email}</div></div>
                  </div>
                </div>
                {[{icon:'👤',label:'My Profile'},{icon:'⚙',label:'Preferences'},{icon:'🔑',label:'Change Password'},{icon:'📊',label:'My Dashboard'}].map(it=>(
                  <div key={it.label} className="ud-item"><span>{it.icon}</span><span>{it.label}</span></div>
                ))}
                <div className="ud-divider"/>
                <div className="ud-item danger" onClick={onLogout}><span>↩</span><span>Sign Out</span></div>
              </div>
            )}
          </div>
        </div>
      </header>

      <div className="body-wrap">
        {/* MOBILE OVERLAY */}
        {mobileOpen&&<div className="sidebar-overlay" onClick={()=>setMobileOpen(false)}/>}

        {/* SIDEBAR */}
        <nav className={`sidebar${!sbOpen?' closed':''}${mobileOpen?' mobile-open':''}`}>
          <div className="sb-toggle-row">
            <button className="sb-toggle-btn" onClick={()=>setSbOpen(o=>!o)}>{sbOpen?'◁':'▷'}</button>
          </div>
          <div className="sb-nav">
            {visibleModules.map((m,idx)=>(
              <div key={m.id}>
                {idx>0&&idx<visibleModules.length&&m.id!=='alerts'&&<div className="sb-divider"/>}
                <button className={`sb-item${activeModule===m.id?' active':''}`}
                  onClick={()=>{setActiveModule(m.id);if(m.subs){setExpanded(p=>({...p,[m.id]:!p[m.id]}));if(m.subs[0]) setActiveSub(m.subs[0]);}setMobileOpen(false);}}>
                  <div className={`sb-icon-wrap ${m.cls}`}>{m.icon}</div>
                  {sbOpen&&<>
                    <span className="sb-label">{m.label}</span>
                    {m.badge&&<span className="sb-badge" style={{background:`var(--${m.cls.split('-')[1]==='q'?'blue':m.cls.split('-')[1]==='e'?'amber':m.cls.split('-')[1]==='g'?'green':m.cls.split('-')[1]==='ad'?'purple':'red'}-lo)`,color:`var(--${m.cls.split('-')[1]==='q'?'blue':m.cls.split('-')[1]==='e'?'amber':m.cls.split('-')[1]==='g'?'green':m.cls.split('-')[1]==='ad'?'purple':'red'})`}}>{m.badge}</span>}
                    {m.subs&&<span className={`sb-chevron${expanded[m.id]?' open':''}`}>▼</span>}
                  </>}
                </button>
                {sbOpen&&m.subs&&(
                  <div className={`sb-sub${expanded[m.id]?' open':''}`}>
                    {m.subs.map(s=>(
                      <button key={s} className={`sb-sub-btn${activeSub===s&&activeModule===m.id?' active':''}`}
                        onClick={()=>{setActiveModule(m.id);setActiveSub(s);setExpanded(p=>({...p,[m.id]:true}));setMobileOpen(false);}}>
                        {s}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
          {/* Sidebar bottom user */}
          <div className="sb-bottom">
            {sbOpen?(
              <div className="sb-user" onClick={()=>setShowUserMenu(o=>!o)}>
                <div style={{width:30,height:30,borderRadius:7,background:`${userColor}22`,border:`1px solid ${userColor}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:userColor,flexShrink:0}}>{user.initials}</div>
                <div className="sb-user-info"><div className="sb-user-name">{user.name}</div><div className="sb-user-role">{ROLE_LABELS[user.role]}</div></div>
                <button className="sb-logout" onClick={e=>{e.stopPropagation();onLogout()}} title="Sign out">↩</button>
              </div>
            ):(
              <div style={{display:'flex',justifyContent:'center',padding:'4px 0'}}>
                <div style={{width:30,height:30,borderRadius:7,background:`${userColor}22`,border:`1px solid ${userColor}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:userColor,cursor:'pointer'}} onClick={onLogout} title="Sign out">{user.initials}</div>
              </div>
            )}
          </div>
        </nav>

        {/* MAIN */}
        <div className="main">
          {curSubs.length>0&&(
            <div className="submod-tabs">
              {curSubs.map(s=>(
                <button key={s} className={`sm-tab${activeSub===s&&activeModule===curModule.id?' '+subColorCls:''}`} onClick={()=>setActiveSub(s)}>{s}</button>
              ))}
            </div>
          )}
          {activeModule==='overview'&&<OverviewView data={liveData} setModule={setModule}/>}
          {activeModule==='q'&&<CastXView sub={activeSub} data={liveData}/>}
          {activeModule==='e'&&<EAFView sub={activeSub} data={liveData}/>}
          {activeModule==='g'&&<DRIView sub={activeSub} data={liveData}/>}
          {activeModule==='admin'&&<AdminView sub={activeSub} currentUser={user}/>}
          {activeModule==='alerts'&&<AlertsView/>}
        </div>
      </div>

      {/* AI ASSISTANT */}
      <AIPanel
        open={aiOpen}
        onClose={()=>setAiOpen(o=>!o)}
        setModule={(mod,sub)=>{setModule(mod,sub);setAiOpen(false);}}
        activeModule={activeModule}
        activeSub={activeSub}
        liveData={liveData}
      />
    </div>
  );
}

/* ══════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════ */
function Root() {
  const [user,setUser]=useState(()=>{try{const s=localStorage.getItem('steeliq_user');return s?JSON.parse(s):null;}catch{return null;}});
  const login=(u)=>setUser(u);
  const logout=()=>{localStorage.removeItem('steeliq_user');setUser(null);};
  return user?<MainApp user={user} onLogout={logout}/>:<LoginScreen onLogin={login}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>


</body></html>
