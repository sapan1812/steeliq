# Alembic configuration for SteelIQ backend
# The sqlalchemy.url is intentionally left as a placeholder – it is overridden
# at runtime by alembic/env.py which reads DATABASE_URL from the environment.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template for auto-generated revision file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Maximum length for the slug in auto-generated file names
truncate_slug_length = 40

# Revision environment
revision_environment = false

# Sourceless flag
sourceless = false

# Version path separator
version_path_separator = os

# Placeholder – overridden in env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
