version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: steeliq
      POSTGRES_USER: steeliq
      POSTGRES_PASSWORD: steeliq_dev_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steeliq"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - steeliq-net

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://steeliq:steeliq_dev_pass@db:5432/steeliq
      SECRET_KEY: dev-secret-key-change-in-production-minimum-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: "http://localhost:3000,http://localhost:80"
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - steeliq-net

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - steeliq-net

volumes:
  postgres_data:

networks:
  steeliq-net:
    driver: bridge
